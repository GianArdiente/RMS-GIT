<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoshop — Staff Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <style>
    
  </style>
</head>
<body>

<div class="bg">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
</div>
<div class="grid"></div>
<div class="noise"></div>
<div id="toastContainer"></div>

<div class="card">

  <!-- corners -->
  <div class="corner c-tl"><svg viewBox="0 0 28 28" fill="none"><path d="M2 2L10 2M2 2L2 10" stroke="#8B6914" stroke-width="1.5" opacity=".6"/><circle cx="2" cy="2" r="1.2" fill="#8B6914" opacity=".5"/></svg></div>
  <div class="corner c-tr"><svg viewBox="0 0 28 28" fill="none"><path d="M26 2L18 2M26 2L26 10" stroke="#8B6914" stroke-width="1.5" opacity=".6"/><circle cx="26" cy="2" r="1.2" fill="#8B6914" opacity=".5"/></svg></div>
  <div class="corner c-bl"><svg viewBox="0 0 28 28" fill="none"><path d="M2 26L10 26M2 26L2 18" stroke="#8B6914" stroke-width="1.5" opacity=".6"/><circle cx="2" cy="26" r="1.2" fill="#8B6914" opacity=".5"/></svg></div>
  <div class="corner c-br"><svg viewBox="0 0 28 28" fill="none"><path d="M26 26L18 26M26 26L26 18" stroke="#8B6914" stroke-width="1.5" opacity=".6"/><circle cx="26" cy="26" r="1.2" fill="#8B6914" opacity=".5"/></svg></div>

  <!-- Gold header -->
  <div class="card-header">
    <i class="fas fa-cog header-cog hc-1"></i>
    <i class="fas fa-cog header-cog hc-2"></i>
    <div class="header-inner">
      <div class="logo-ring">
        <img src="Ecologo.png" alt="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="fallback">A</span>
      </div>
      <div class="header-text">
        <div class="header-eyebrow">// Autoshop Management</div>
        <div class="header-title">TECHNICIAN ACCESS</div>
        <div class="staff-badge"><i class="fas fa-shield-alt"></i> RESTRICTED PORTAL</div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="card-body">
    <div class="icon-row">
      <i class="fas fa-wrench"></i><div class="ir-sep"></div>
      <i class="fas fa-car"></i><div class="ir-sep"></div>
      <i class="fas fa-cog"></i><div class="ir-sep"></div>
      <i class="fas fa-tools"></i>
    </div>

    <form class="form" id="loginForm" novalidate>

      <div>
        <div class="field-label"><i class="fas fa-envelope" style="margin-right:5px;font-size:8px"></i>Technician Email</div>
        <div class="field">
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="email" placeholder="you@autoshop.com" autocomplete="email" required>
        </div>
      </div>

      <div>
        <div class="field-label"><i class="fas fa-lock" style="margin-right:5px;font-size:8px"></i>Password</div>
        <div class="field">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <i class="fas fa-eye eye-btn" id="togglePwd"></i>
        </div>
      </div>

      <div class="options-row">
        <label class="remember-wrap">
          <input type="checkbox" id="remember">
          <div class="checkbox-box"></div>
          <span class="remember-label">Remember me</span>
        </label>
        <span class="forgot" id="forgotBtn">Forgot password?</span>
      </div>

      <button type="submit" class="btn-submit">
        <i class="fas fa-sign-in-alt"></i>ACCESS DASHBOARD
      </button>

    </form>

    <div class="status-bar">
      <div class="status-left">
        <div class="status-dot"></div>
        System Online
      </div>
      <div class="version">v2.4.1</div>
    </div>
  </div>
</div>

<script>
  // Password toggle
  document.getElementById('togglePwd').addEventListener('click', function () {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
  });

  // Forgot password
  document.getElementById('forgotBtn').addEventListener('click', () => {
    toast('Password reset instructions sent to your email.', 'success');
  });

  // Form submit
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;

    document.getElementById('email').classList.remove('error');
    document.getElementById('password').classList.remove('error');

    if (!email || !email.includes('@')) {
      document.getElementById('email').classList.add('error');
      return toast('Please enter a valid staff email.');
    }
    if (!pass) {
      document.getElementById('password').classList.add('error');
      return toast('Please enter your password.');
    }

    toast('Authenticating…', 'success');
    // Hook your auth logic here
  });

  // Toast
  function toast(msg, type = 'error') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3100);
  }
</script>
</body>
</html>
