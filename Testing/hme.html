  │                                                         │
  │ 2. FirebaseDatabase.js (module)                         │
  │    Initialises the ONE shared Firebase app instance.    │
  │    Starts onSnapshot listeners for Products/Promos/News.│
  │    Populates window.PRODUCTS (needed by Shop.js).       │
  │    ⚠ Was incorrectly named "Firebasedatabase2.js" —     │

  │                                                         │
  │ 3. CustomerBackend.js (module)                          │
  │    Reuses the app from step 2 (getApps()[0]).           │
  │    Watches Auth state, loads customer Firestore doc,    │
  │    overrides window.saveProfileChanges + handleLogout.  │
  │                                                         │
  │ 4. FirebaseHome.js (module)                             │
  │    Home-page-specific Firebase logic.                   │
  │                                                         │
  │ 5. FirebaseBooking.js (module)                          │

  └─────────────────────────────────────────────────────────┘

  ALL modules use SDK 10.7.2. Mixing versions creates
