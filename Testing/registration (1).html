<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Autoshop - Autoshop Sign in/Sign up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Hexagonal background pattern */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(218, 165, 32, 0.03) 50px, rgba(218, 165, 32, 0.03) 51px),
        repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(218, 165, 32, 0.03) 50px, rgba(218, 165, 32, 0.03) 51px);
      opacity: 0.5;
      z-index: 0;
    }

    /* Floating hexagons */
    .hex {
      position: absolute;
      width: 80px;
      height: 92px;
      background: linear-gradient(135deg, rgba(218, 165, 32, 0.15), rgba(255, 215, 0, 0.1));
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }

    .hex1 { top: 10%; left: 10%; animation-delay: 0s; }
    .hex2 { top: 60%; left: 5%; width: 60px; height: 69px; animation-delay: 2s; }
    .hex3 { top: 80%; left: 15%; animation-delay: 4s; }
    .hex4 { top: 15%; right: 10%; width: 70px; height: 81px; animation-delay: 1s; }
    .hex5 { top: 50%; right: 5%; animation-delay: 3s; }
    .hex6 { top: 70%; right: 12%; width: 90px; height: 104px; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-25px) rotate(10deg); opacity: 0.6; }
    }
/* Hide slider button and text */
#slider h2,
#slider h3,
#slider .slider-btn {
  display: none !important;
}

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 900px;
      height: 550px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(218, 165, 32, 0.2);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(218, 165, 32, 0.1);
      display: flex;
      position: relative;
    }

    /* Panels */
    .panel {
      width: 50%;
      padding: 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
    }

    .left-panel {
      border-right: 1px solid rgba(218, 165, 32, 0.1);
    }

    /* Slider overlay */
    .slider {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(135deg, #DAA520 0%, #B8860B 50%, #8B6508 100%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 0 50px rgba(218, 165, 32, 0.3);
      overflow: hidden;
    }

    /* Abstract geometric background */
    .slider::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(139, 101, 8, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(218, 165, 32, 0.15) 0%, transparent 40%);
      animation: moveBackground 20s ease-in-out infinite;
    }

    .slider::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0, 0, 0, 0.05) 15px, rgba(0, 0, 0, 0.05) 30px),
        repeating-linear-gradient(-45deg, transparent, transparent 15px, rgba(255, 255, 255, 0.03) 15px, rgba(255, 255, 255, 0.03) 30px);
      clip-path: polygon(
        0 0,
        100% 0,
        100% 20%,
        80% 20%,
        80% 40%,
        100% 40%,
        100% 60%,
        60% 60%,
        60% 80%,
        100% 80%,
        100% 100%,
        0 100%,
        0 80%,
        20% 80%,
        20% 60%,
        0 60%,
        0 40%,
        40% 40%,
        40% 20%,
        0 20%
      );
    }

    @keyframes moveBackground {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-5%, 5%) rotate(2deg); }
      50% { transform: translate(5%, -5%) rotate(-2deg); }
      75% { transform: translate(-5%, -5%) rotate(1deg); }
    }

    .slider > * {
      position: relative;
      z-index: 1;
    }

    /* Slider positions */
    .slider-right {
      left: 0;
      transform: translateX(100%);
    }

    .slider-left {
      left: 0;
      transform: translateX(0);
    }

    /* Logo */
    .logo {
      width: 70px;
      height: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    /* Decorative corner icons */
    .corner-icon {
      position: absolute;
      color: rgba(218, 165, 32, 0.2);
      font-size: 2rem;
      z-index: 1;
      animation: pulse 3s ease-in-out infinite;
    }

    .corner-icon.top-left {
      top: 1rem;
      left: 1rem;
    }

    .corner-icon.top-right {
      top: 1rem;
      right: 1rem;
    }

    .corner-icon.bottom-left {
      bottom: 1rem;
      left: 1rem;
    }

    .corner-icon.bottom-right {
      bottom: 1rem;
      right: 1rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    /* Typography */
    h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #DAA520, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    h2 i {
      background: linear-gradient(135deg, #DAA520, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.3rem;
    }

    .slider h2,
    .slider h3 {
      color: #0a0a0a;
      -webkit-text-fill-color: #0a0a0a;
      text-shadow: none;
    }

    h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.4;
    }

    /* Social buttons */
    .social-btns {
      display: flex;
      gap: 1rem;
      margin: 0.8rem 0;
    }

    .social-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(218, 165, 32, 0.4);
      background: transparent;
      color: #DAA520;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .social-btn:hover {
      background: rgba(218, 165, 32, 0.2);
      border-color: #FFD700;
      transform: translateY(-3px);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      width: 100%;
      margin: 0.8rem 0;
      gap: 1rem;
      font-size: 0.75rem;
      color: rgba(218, 165, 32, 0.6);
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(218, 165, 32, 0.3);
    }

    /* Form */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

  .input-wrapper {
  position: relative;
  width: 100%;
  display: flex;           /* make icon + input a flex row */
  align-items: center;     /* vertically center icon and input */
}


.input-wrapper input {
  flex: 1;                 /* take remaining space */
  padding: 0.7rem 1rem;    /* vertical + right padding */
  padding-left: 2.8rem;    /* space for icon */
  background: rgba(218, 165, 32, 0.05);
  border: 1px solid rgba(218, 165, 32, 0.3);
  border-radius: 8px;
  color: #fff;
  font-size: 0.85rem;
  outline: none;
}

   .input-icon {
  position: absolute;
  left: 1rem;
  color: #DAA520;
  font-size: 1rem;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

    input {
  width: 100%;
  padding: 0.7rem 1rem 0.7rem 2.8rem; /* left padding matches icon width + spacing */
  background: rgba(218, 165, 32, 0.05);
  border: 1px solid rgba(218, 165, 32, 0.3);
  border-radius: 8px;
  color: #fff;
  font-size: 0.85rem;
  outline: none;
}


    input::placeholder {
      color: rgba(218, 165, 32, 0.4);
    }

    input:focus {
      background: rgba(218, 165, 32, 0.1);
      border-color: #FFD700;
    }

    .eye-toggle {
  position: absolute;
  right: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  cursor: pointer;
  color: #DAA520;
}



    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #DAA520, #FFD700);
      border: none;
      border-radius: 8px;
      color: #0a0a0a;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(218, 165, 32, 0.4);
    }

    .btn-text {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      padding: 0.3rem 0;
    }

    .btn-text .link-text {
      color: #DAA520;
      cursor: pointer;
      transition: color 0.3s;
    }

    .btn-text .link-text:hover {
      color: #FFD700;
    }

    .forgot-link {
      text-align: right;
      font-size: 0.75rem;
      color: rgba(218, 165, 32, 0.7);
      cursor: pointer;
      margin-top: -0.2rem;
    }

    .forgot-link:hover {
      color: #FFD700;
    }

    /* Slider button */
    .slider-btn {
      padding: 0.7rem 2rem;
      background: rgba(10, 10, 10, 0.8);
      border: 2px solid rgba(10, 10, 10, 0.6);
      border-radius: 50px;
      color: #FFD700;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      margin-top: 1.2rem;
      font-family: 'Rajdhani', sans-serif;
    }

    .slider-btn:hover {
      background: #0a0a0a;
      transform: scale(1.05);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 1rem 2rem;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
      z-index: 1000;
    }

    .toast.success {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .toast.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
        min-height: 90vh;
        max-width: 95%;
      }

      .panel {
        width: 100%;
        padding: 2rem 1.5rem;
        min-height: auto;
      }

      .left-panel {
        border-right: none;
        border-bottom: 1px solid rgba(218, 165, 32, 0.1);
      }

      .slider {
        position: relative;
        width: 100%;
        height: auto;
        min-height: 200px;
        transform: none !important;
        padding: 2rem 1.5rem;
      }

      .slider-right,
      .slider-left {
        order: -1;
      }

      h2 {
        font-size: 1.3rem;
      }

      h2 i {
        font-size: 1.1rem;
      }

      h3 {
        font-size: 1rem;
      }

      .logo {
        width: 60px;
      }

      .social-btn {
        width: 38px;
        height: 38px;
        font-size: 0.9rem;
      }

      .divider {
        font-size: 0.7rem;
      }

      input {
        font-size: 0.8rem;
        padding: 0.65rem 0.8rem 0.65rem 2.5rem;
      }

      .input-icon {
        left: 0.8rem;
        font-size: 0.9rem;
      }

      .eye-toggle {
        right: 0.8rem;
        font-size: 0.9rem;
      }

      .btn-primary {
        font-size: 0.85rem;
        padding: 0.7rem;
      }

      .btn-text {
        font-size: 0.75rem;
      }

      .forgot-link {
        font-size: 0.7rem;
      }

      .slider-btn {
        font-size: 0.85rem;
        padding: 0.6rem 1.5rem;
      }

      .hex {
        display: none;
      }

      .corner-icon {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
        border-radius: 12px;
      }

      .panel {
        padding: 1.5rem 1.2rem;
      }

      .slider {
        padding: 1.5rem 1.2rem;
        min-height: 180px;
      }

      h2 {
        font-size: 1.2rem;
      }

      h3 {
        font-size: 0.95rem;
      }

      .form {
        gap: 0.65rem;
      }

      .corner-icon {
        font-size: 1.2rem;
      }

      .corner-icon.top-left,
      .corner-icon.top-right {
        top: 0.5rem;
      }

      .corner-icon.bottom-left,
      .corner-icon.bottom-right {
        bottom: 0.5rem;
      }

      .corner-icon.top-left,
      .corner-icon.bottom-left {
        left: 0.5rem;
      }

      .corner-icon.top-right,
      .corner-icon.bottom-right {
        right: 0.5rem;
      }
    }

    /* Landscape mobile */
    @media (max-height: 600px) and (orientation: landscape) {
      .container {
        height: auto;
        min-height: auto;
      }

      .panel {
        padding: 1.5rem;
      }

      .slider {
        min-height: 150px;
        padding: 1.5rem;
      }

      .logo {
        width: 50px;
        margin-bottom: 0.5rem;
      }

      h2 {
        margin-bottom: 0.8rem;
      }

      .social-btns {
        margin: 0.5rem 0;
      }

      .form {
        gap: 0.6rem;
      }
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <!-- Floating hexagons -->
  <div class="hex hex1"></div>
  <div class="hex hex2"></div>
  <div class="hex hex3"></div>
  <div class="hex hex4"></div>
  <div class="hex hex5"></div>
  <div class="hex hex6"></div>

  <div id="toastContainer"></div>

  <div class="container" id="container">
    
    <!-- Decorative corner icons -->
    <i class="fas fa-cog corner-icon top-left"></i>
    <i class="fas fa-microchip corner-icon top-right"></i>
    <i class="fas fa-tools corner-icon bottom-left"></i>
    <i class="fas fa-car corner-icon bottom-right"></i>
    
    <!-- Left Panel - Sign Up -->
    <div class="panel left-panel">
      <img src="Ecologo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h2><i class="fas fa-user-plus"></i> Create Account</h2>
      
      <div class="social-btns">
        <button class="social-btn"><i class="fab fa-google"></i></button>
        <button class="social-btn"><i class="fas fa-phone"></i></button>
      </div>
      
      <div class="divider">or use your email for registration</div>
      
      <form class="form" id="signupForm">
        <div class="input-wrapper">
  <i class="fas fa-user input-icon"></i>
  <input type="text" placeholder="Full Name" id="fullName" required>
</div>

<div class="input-wrapper">
  <i class="fas fa-envelope input-icon"></i>
  <input type="email" placeholder="Email" id="email" required>
</div>

<div class="input-wrapper">
  <i class="fas fa-lock input-icon"></i>
  <input type="password" placeholder="Password" id="password" required>
  <i class="fas fa-eye eye-toggle" id="togglePassword"></i>
</div>

<div class="input-wrapper">
  <i class="fas fa-lock input-icon"></i>
  <input type="password" placeholder="Confirm Password" id="confirmPassword" required>
  <i class="fas fa-eye eye-toggle" id="toggleConfirmPassword"></i>
</div>
        
        <button type="submit" class="btn-primary">Create Account</button>
        
        <div class="btn-text">
          Already have an account? <span class="link-text" id="goToLogin">Log in</span>
        </div>
      </form>
    </div>

    <!-- Right Panel - Login -->
    <div class="panel right-panel">
      <img src="Ecologo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h2><i class="fas fa-sign-in-alt"></i> Log in to Autoshop</h2>
      
      <div class="social-btns">
        <button class="social-btn"><i class="fab fa-google"></i></button>
        <button class="social-btn"><i class="fas fa-phone"></i></button>
      </div>
      
      <div class="divider">or use your email for log in</div>
      
      <form class="form" id="loginForm">
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" placeholder="Email" id="loginEmail" required>
        </div>
        
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" placeholder="Password" id="loginPassword" required>
          <i class="fas fa-eye eye-toggle" id="toggleLoginPassword"></i>
        </div>
        
        <div class="forgot-link" id="forgotPassword">Forgot your password?</div>
        
        <button href ="landingpage.html" type="submit" class="btn-primary">Log In</button>
        
        <div class="btn-text">
          Don't have an account? <span class="link-text" id="goToSignup">Sign up</span>
        </div>
      </form>
    </div>

    <!-- Sliding Overlay -->
    <div class="slider slider-right" id="slider">
      <img src="Ecologo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h2 id="sliderTitle">Log in to Autoshop</h2>
      <h3 id="sliderSubtitle">Manage your smart irrigation system<br>and grow healthier crops</h3>
      <button class="slider-btn" id="sliderBtn">Log In</button>
    </div>

  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    
    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      $('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Slider controls
    const slider = $('slider');
    const sliderBtn = $('sliderBtn');
    const sliderTitle = $('sliderTitle');
    const sliderSubtitle = $('sliderSubtitle');
    let isOnSignup = true;

    function moveToLogin() {
      slider.classList.remove('slider-right');
      slider.classList.add('slider-left');
      sliderTitle.textContent = 'Sign Up to EcoDrip';
      sliderSubtitle.innerHTML = 'Keep your farm growing<br>the smart way';
      sliderBtn.textContent = 'Sign Up';
      isOnSignup = false;
    }

    function moveToSignup() {
      slider.classList.remove('slider-left');
      slider.classList.add('slider-right');
      sliderTitle.textContent = 'Log in to Autoshop';
      sliderSubtitle.innerHTML = 'Manage your smart irrigation system<br>and grow healthier crops';
      sliderBtn.textContent = 'Log In';
      isOnSignup = true;
    }

    // Event listeners
    sliderBtn.addEventListener('click', () => {
      if (isOnSignup) {
        moveToLogin();
      } else {
        moveToSignup();
      }
    });

    $('goToLogin').addEventListener('click', (e) => {
      e.preventDefault();
      moveToLogin();
    });

    $('goToSignup').addEventListener('click', (e) => {
      e.preventDefault();
      moveToSignup();
    });

    // Password toggles
    function setupPasswordToggle(toggleId, inputId) {
      const toggle = $(toggleId);
      const input = $(inputId);
      if (toggle && input) {
        toggle.addEventListener('click', () => {
          input.type = input.type === 'password' ? 'text' : 'password';
          toggle.classList.toggle('fa-eye');
          toggle.classList.toggle('fa-eye-slash');
        });
      }
    }

    setupPasswordToggle('togglePassword', 'password');
    setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');
    setupPasswordToggle('toggleLoginPassword', 'loginPassword');

    // Form submissions
    $('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const password = $('password').value;
      const confirmPassword = $('confirmPassword').value;

      if (password !== confirmPassword) {
        showToast('Passwords do not match!', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('Password must be at least 6 characters!', 'error');
        return;
      }

      showToast('Account created successfully!', 'success');
      setTimeout(() => {
        $('signupForm').reset();
        moveToLogin();
      }, 1500);
    });

    $('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('Login successful!', 'success');
      setTimeout(() => {
        $('loginForm').reset();
        console.log('Redirecting to dashboard...');
      }, 1500);
    });

    // Forgot password
    $('forgotPassword').addEventListener('click', () => {
      showToast('Password reset link sent!', 'success');
    });

    // Social buttons
    document.querySelectorAll('.social-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showToast('Social login coming soon!', 'success');
      });
    });
  </script>

</body>
</html>
