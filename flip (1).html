<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Card</title>

  <!-- Tailwind CLI Output -->
  <link href="./output.css" rel="stylesheet">

  <!-- Your Custom CSS -->
  <link rel="stylesheet" href="../style.css?v=1.5">

  <style>
    /* ================================ */
    /* FLIP CARD CORE                   */
    /* ================================ */
    .flip-card {
      perspective: 1000px;
      position: relative;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.7s ease;
      transform-style: preserve-3d;
    }

    /* Flip only when .active is on the card */
    .flip-card.active .flip-inner {
      transform: rotateY(180deg);
    }

    /* BOTH SIDES — stacked, same size */
    .flip-front,
    .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 1rem;
      overflow: hidden;
    }

    /* FRONT on top by default */
    .flip-front {
      z-index: 2;
    }

    /* BACK starts rotated, comes forward on flip */
    .flip-back {
      transform: rotateY(180deg);
      z-index: 1;
    }

    /* ================================ */
    /* POINTER EVENT GUARDS             */
    /* Prevents clicks bleeding through */
    /* ================================ */
    .flip-card.active .flip-front {
      pointer-events: none;
    }

    .flip-card:not(.active) .flip-back {
      pointer-events: none;
    }

    /* ================================ */
    /* SCROLLABLE BACK PANEL            */
    /* overflow-y must be on the inner  */
    /* scrollable div, not the .flip-back */
    /* ================================ */
    .back-scroll {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1.5rem;
      box-sizing: border-box;

      /* Custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: #D4AF37 #f1f1f1;
    }

    .back-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .back-scroll::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .back-scroll::-webkit-scrollbar-thumb {
      background: #D4AF37;
      border-radius: 10px;
    }

    /* ================================ */
    /* DISABLED INPUT STYLES            */
    /* ================================ */
    input:disabled,
    select:disabled {
      background-color: #f9fafb;
      color: #6b7280;
      cursor: default;
    }
  </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="flip-card w-72 h-96">

    <div class="flip-inner">

      <!-- ======================== -->
      <!-- FRONT SIDE               -->
      <!-- ======================== -->
      <div class="flip-front bg-blue-600 text-white rounded-2xl shadow-xl flex items-center justify-center relative">

        <!-- Profile Photo -->
        <div class="top-4 w-full aspect-[3/4] bg-gradient-to-br from-gray-200 to-gray-300 rounded-2xl overflow-hidden shadow-lg">
          <img
            id="profilePhoto"
            src="/Assets/AJ.png"
            alt="Profile Photo"
            class="w-full h-full object-cover"
          />
        </div>

        <!-- Name Overlay -->
        <div class="absolute top-50 left-0 w-full h-full flex items-center justify-center">
          <h2>OK</h2>
        </div>

        <!-- Details Button (triggers flip) -->
        <button
          id="detailsBtn"
          class="absolute bottom-4 right-4 flex items-center gap-2
                 bg-white/90 hover:bg-white
                 text-gray-800 text-sm font-semibold
                 px-4 py-2 rounded-full shadow-lg
                 transition duration-200 cursor-pointer z-10">

          <!-- Plus Icon -->
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Details
        </button>

      </div>

      <!-- ======================== -->
      <!-- BACK SIDE                -->
      <!-- ======================== -->
      <div class="flip-back bg-white text-gray-900 rounded-2xl shadow-xl relative">

        <!-- Scrollable Content Wrapper -->
        <div class="back-scroll">

          <!-- Top Bar: See Less + Edit -->
          <div class="flex justify-between items-center mb-4">

            <!-- See Less Button (triggers flip back) -->
            <button
              id="seeLessBtn"
              class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition text-sm font-semibold cursor-pointer">
              See Less
            </button>

            <!-- Edit Button -->
            <button
              id="editBtn"
              onclick="toggleEdit()"
              class="flex items-center gap-2 px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors duration-200 text-sm font-semibold text-gray-700 cursor-pointer">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
              <span>Edit</span>
            </button>
          </div>

          <!-- Profile Image -->
          <div class="flex justify-center mb-6">
            <img
              src="/Assets/AJ.png"
              alt="Profile Photo"
              class="w-20 h-20 rounded-full object-cover border-4 border-white shadow-lg"
            />
          </div>

          <!-- Form Fields -->
          <form id="profileForm" class="space-y-4">

            <!-- Email -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Email</label>
              <input
                type="email"
                id="email"
                value="johncedrik@gmail.com"
                disabled
                class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors"
              />
            </div>

            <!-- Secondary Email -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Secondary Email</label>
              <input
                type="email"
                id="secondaryEmail"
                value="catch2@email.com"
                disabled
                class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors"
              />
            </div>

            <!-- Contact Number -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Contact Number</label>
              <input
                type="tel"
                id="contactNumber"
                value="09123456456"
                disabled
                class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors"
              />
            </div>

            <!-- Birthday -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Birthday</label>
              <input
                type="date"
                id="birthday"
                value="1999-04-20"
                disabled
                class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors"
              />
            </div>

            <!-- Address -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Address</label>
              <input
                type="text"
                id="address"
                value="Makati City, Metro Manila"
                disabled
                class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors"
              />
            </div>

            <!-- Gender -->
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Gender</label>
              <select
                id="gender"
                disabled
                class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors"
              >
                <option value="Male" selected>Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
                <option value="Prefer not to say">Prefer not to say</option>
              </select>
            </div>

            <!-- Action Buttons (hidden until edit mode) -->
            <div id="actionButtons" class="hidden pt-4 space-y-3">

              <button
                type="button"
                onclick="saveChanges()"
                class="w-full bg-gradient-to-r from-[#D4AF37] via-[#d4b24b] to-[#e8c84a] text-white font-bold text-sm tracking-wide uppercase rounded-full px-6 py-3 shadow-lg hover:shadow-xl hover:opacity-90 transition-all duration-200">
                Save Changes
              </button>

              <button
                type="button"
                onclick="deleteAccount()"
                class="w-full bg-gradient-to-r from-gray-700 to-gray-800 text-white font-bold text-sm tracking-wide uppercase rounded-full px-6 py-3 shadow-lg hover:shadow-xl hover:opacity-90 transition-all duration-200">
                Delete Account
              </button>

            </div>

          </form>
        </div><!-- end .back-scroll -->

      </div><!-- end .flip-back -->

    </div><!-- end .flip-inner -->
  </div><!-- end .flip-card -->


  <script>
    /* ======================================= */
    /* STATE                                   */
    /* ======================================= */
    let isEditing = false;

    const flipCard   = document.querySelector('.flip-card');
    const detailsBtn = document.getElementById('detailsBtn');
    const seeLessBtn = document.getElementById('seeLessBtn');

    /* ======================================= */
    /* FLIP TO BACK — Details button only      */
    /* ======================================= */
    detailsBtn.addEventListener('click', function () {
      flipCard.classList.add('active');
    });

    /* ======================================= */
    /* FLIP TO FRONT — See Less button only    */
    /* If editing, cancel edit first then flip */
    /* ======================================= */
    seeLessBtn.addEventListener('click', function () {
      if (isEditing) {
        cancelEdit();   // reset edit state cleanly
      }
      flipCard.classList.remove('active');
    });

    /* ======================================= */
    /* TOGGLE EDIT MODE                        */
    /* ======================================= */
    function toggleEdit() {
      if (isEditing) {
        cancelEdit();
      } else {
        startEdit();
      }
    }

    function startEdit() {
      isEditing = true;

      const inputs        = document.querySelectorAll('#profileForm input, #profileForm select');
      const actionButtons = document.getElementById('actionButtons');
      const editBtn       = document.getElementById('editBtn');

      // Enable all form fields
      inputs.forEach(input => input.removeAttribute('disabled'));

      // Show Save / Delete buttons
      actionButtons.classList.remove('hidden');

      // Update Edit button → Cancel
      editBtn.innerHTML = `
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <span>Cancel</span>
      `;
      editBtn.classList.remove('bg-gray-200', 'hover:bg-gray-300', 'text-gray-700');
      editBtn.classList.add('bg-red-100', 'hover:bg-red-200', 'text-red-700');
    }

    function cancelEdit() {
      isEditing = false;

      const inputs        = document.querySelectorAll('#profileForm input, #profileForm select');
      const actionButtons = document.getElementById('actionButtons');
      const editBtn       = document.getElementById('editBtn');

      // Disable all form fields
      inputs.forEach(input => input.setAttribute('disabled', true));

      // Hide Save / Delete buttons
      actionButtons.classList.add('hidden');

      // Restore Edit button
      editBtn.innerHTML = `
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        <span>Edit</span>
      `;
      editBtn.classList.remove('bg-red-100', 'hover:bg-red-200', 'text-red-700');
      editBtn.classList.add('bg-gray-200', 'hover:bg-gray-300', 'text-gray-700');
    }

    /* ======================================= */
    /* SAVE                                    */
    /* ======================================= */
    function saveChanges() {
      const formData = {
        email:          document.getElementById('email').value,
        secondaryEmail: document.getElementById('secondaryEmail').value,
        contactNumber:  document.getElementById('contactNumber').value,
        birthday:       document.getElementById('birthday').value,
        address:        document.getElementById('address').value,
        gender:         document.getElementById('gender').value
      };

      console.log('Saving profile data:', formData);

      setTimeout(() => {
        alert('✓ Profile updated successfully!');
        cancelEdit();
      }, 500);
    }

    /* ======================================= */
    /* DELETE                                  */
    /* ======================================= */
    function deleteAccount() {
      if (confirm('Are you sure you want to delete your account? This cannot be undone.')) {
        console.log('Account deletion requested.');
        alert('Account deleted.');
      }
    }
  </script>

</body>
</html>
