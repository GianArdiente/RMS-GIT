<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Profile - RMS</title>
    <link href="./dist/output.css" rel="stylesheet" />
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=1.5">
</head>

<body class="min-h-screen bg-[url('./Assets/image-60.png')] bg-cover bg-center bg-no-repeat">
  
  <!-- ========================================
       HEADER
  ======================================== -->
  <header class="bg-[#1a1a1a] text-white fixed top-0 left-0 w-full z-50 shadow-lg">
    <section class="max-w-[100rem] mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
      
      <!-- Left: Logo -->
      <div class="flex items-center gap-3">
        <!-- Gold Grid Icon -->
        <div class="w-10 h-10 bg-[#D4AF37] rounded-md flex items-center justify-center">
          <svg viewBox="0 0 20 20" class="w-6 h-6" fill="none">
            <rect x="1" y="1" width="7.5" height="7.5" rx="1" fill="white"/>
            <rect x="11.5" y="1" width="7.5" height="7.5" rx="1" fill="white"/>
            <rect x="1" y="11.5" width="7.5" height="7.5" rx="1" fill="white"/>
            <rect x="11.5" y="11.5" width="7.5" height="7.5" rx="1" fill="white"/>
          </svg>
        </div>
        <!-- REV Logo Text -->
        <div class="flex items-baseline gap-0.5">
          <span class="text-white font-black text-xl italic tracking-wide">REV</span>
          <span class="text-[#D4AF37] font-black text-2xl italic leading-none">⚡</span>
        </div>
      </div>

      <!-- Right: Page Title -->
      <div class="text-white text-sm sm:text-base font-semibold">
        Customer Profile - AJ
      </div>

    </section>
  </header>

  <!-- ========================================
       MAIN CONTENT
  ======================================== -->
  <main class="pt-20 pb-8 px-3 sm:px-4 md:px-6 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-[95%] sm:max-w-[90%] lg:max-w-5xl">

      <!-- Profile Container -->
      <div class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 rounded-2xl sm:rounded-3xl overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.6)] relative">
        
        <!-- Decorative Car Background -->
        <div class="absolute inset-0 opacity-20 pointer-events-none">
          <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200&h=600&fit=crop&auto=format" alt="Car" class="w-full h-full object-cover" />
        </div>

        <div class="relative z-10 p-6 sm:p-8 md:p-12">
          
          <div class="grid lg:grid-cols-2 gap-6 lg:gap-8 items-start">

            <!-- =====================================
                 LEFT SIDE: Profile Card with Photo
            ===================================== -->
            <div class="flex justify-center lg:justify-start">
              <div class="bg-gradient-to-br from-gray-100 to-white rounded-2xl sm:rounded-3xl p-6 sm:p-8 shadow-[0_15px_40px_rgba(0,0,0,0.3)] w-full max-w-md">
                
                <!-- Close Button (Top Right) -->
                <div class="flex justify-end mb-2">
                  <button onclick="closeProfile()" class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300 flex items-center justify-center transition-colors duration-200">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  </button>
                </div>

                <!-- Profile Photo -->
                <div class="relative mb-6">
                  <div class="w-full aspect-[3/4] bg-gradient-to-br from-gray-200 to-gray-300 rounded-2xl overflow-hidden shadow-lg">
                    <img 
                      id="profilePhoto"
                      src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=500&fit=crop&auto=format" 
                      alt="Profile Photo" 
                      class="w-full h-full object-cover"
                    />
                  </div>
                  
                  <!-- Upload Photo Button (Centered Bottom) -->
                  <div class="absolute -bottom-4 left-1/2 -translate-x-1/2">
                    <button onclick="uploadPhoto()" class="w-12 h-12 rounded-full bg-gradient-to-br from-[#D4AF37] to-[#c9a227] shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-200 flex items-center justify-center">
                      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                      </svg>
                    </button>
                  </div>
                </div>

                <!-- Name -->
                <h2 class="text-center text-2xl sm:text-3xl font-bold text-gray-900 mb-6 mt-6">
                  John Cedrik
                </h2>

                <!-- Action Buttons Row -->
                <div class="flex justify-center gap-4 mb-4">
                  
                  <!-- Camera/Gallery -->
                  <button onclick="openGallery()" class="w-12 h-12 rounded-full bg-[#D4AF37] hover:bg-[#c9a227] transition-colors duration-200 flex items-center justify-center shadow-md">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                  </button>

                  <!-- Phone/Contact -->
                  <button onclick="callCustomer()" class="w-12 h-12 rounded-full bg-[#D4AF37] hover:bg-[#c9a227] transition-colors duration-200 flex items-center justify-center shadow-md">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                  </button>

                  <!-- ID/Badge -->
                  <button onclick="viewCredentials()" class="w-12 h-12 rounded-full bg-[#D4AF37] hover:bg-[#c9a227] transition-colors duration-200 flex items-center justify-center shadow-md">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
                    </svg>
                  </button>

                </div>

              </div>
            </div>

            <!-- =====================================
                 RIGHT SIDE: Profile Information Form
            ===================================== -->
            <div class="bg-gradient-to-br from-white to-gray-50 rounded-2xl sm:rounded-3xl p-6 sm:p-8 shadow-[0_15px_40px_rgba(0,0,0,0.3)]">
              
              <!-- Edit Button (Top Right) -->
              <div class="flex justify-end mb-4">
                <button id="editBtn" onclick="toggleEdit()" class="flex items-center gap-2 px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors duration-200 text-sm font-semibold text-gray-700">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                  <span>Edit</span>
                </button>
              </div>

              <!-- Profile Form -->
              <form id="profileForm" class="space-y-4">
                
                <!-- Email -->
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Email</label>
                  <input 
                    type="email" 
                    id="email"
                    value="johncedrik@gmail.com"
                    disabled
                    class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors disabled:bg-gray-50 disabled:text-gray-600"
                  />
                </div>

                <!-- Secondary Email -->
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Secondary Email</label>
                  <input 
                    type="email" 
                    id="secondaryEmail"
                    value="catch2@email.com"
                    disabled
                    class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors disabled:bg-gray-50 disabled:text-gray-600"
                  />
                </div>

                <!-- Contact Number -->
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Contact Number</label>
                  <input 
                    type="tel" 
                    id="contactNumber"
                    value="09123456456"
                    disabled
                    class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors disabled:bg-gray-50 disabled:text-gray-600"
                  />
                </div>

                <!-- Birthday -->
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Birthday</label>
                  <input 
                    type="date" 
                    id="birthday"
                    value="1999-04-20"
                    disabled
                    class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors disabled:bg-gray-50 disabled:text-gray-600"
                  />
                </div>

                <!-- Address -->
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Address</label>
                  <input 
                    type="text" 
                    id="address"
                    value="Makati City, Metro Manila"
                    disabled
                    class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors disabled:bg-gray-50 disabled:text-gray-600"
                  />
                </div>

                <!-- Gender -->
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Gender</label>
                  <select 
                    id="gender"
                    disabled
                    class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-sm text-gray-900 font-medium focus:border-[#D4AF37] focus:outline-none transition-colors disabled:bg-gray-50 disabled:text-gray-600"
                  >
                    <option value="Male" selected>Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                    <option value="Prefer not to say">Prefer not to say</option>
                  </select>
                </div>

                <!-- Action Buttons (Hidden by default, shown when editing) -->
                <div id="actionButtons" class="hidden pt-4 space-y-3">
                  
                  <button 
                    type="button"
                    onclick="saveChanges()"
                    class="w-full bg-gradient-to-r from-[#D4AF37] via-[#d4b24b] to-[#e8c84a] text-white font-bold text-sm tracking-wide uppercase rounded-full px-6 py-3 shadow-lg hover:shadow-xl hover:opacity-90 transition-all duration-200"
                  >
                    Save Changes
                  </button>

                  <button 
                    type="button"
                    onclick="deleteAccount()"
                    class="w-full bg-gradient-to-r from-gray-700 to-gray-800 text-white font-bold text-sm tracking-wide uppercase rounded-full px-6 py-3 shadow-lg hover:shadow-xl hover:opacity-90 transition-all duration-200"
                  >
                    Delete Account
                  </button>

                </div>

              </form>

            </div>

          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- ========================================
       JAVASCRIPT
  ======================================== -->
  <script>
    let isEditing = false;

    // Toggle Edit Mode
    function toggleEdit() {
      isEditing = !isEditing;
      const form = document.getElementById('profileForm');
      const inputs = form.querySelectorAll('input, select');
      const actionButtons = document.getElementById('actionButtons');
      const editBtn = document.getElementById('editBtn');

      if (isEditing) {
        // Enable editing
        inputs.forEach(input => {
          input.disabled = false;
          input.classList.remove('disabled:bg-gray-50', 'disabled:text-gray-600');
        });
        actionButtons.classList.remove('hidden');
        editBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          <span>Cancel</span>
        `;
        editBtn.classList.remove('bg-gray-200', 'hover:bg-gray-300');
        editBtn.classList.add('bg-red-100', 'hover:bg-red-200', 'text-red-700');
      } else {
        // Disable editing
        inputs.forEach(input => {
          input.disabled = true;
          input.classList.add('disabled:bg-gray-50', 'disabled:text-gray-600');
        });
        actionButtons.classList.add('hidden');
        editBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
          <span>Edit</span>
        `;
        editBtn.classList.remove('bg-red-100', 'hover:bg-red-200', 'text-red-700');
        editBtn.classList.add('bg-gray-200', 'hover:bg-gray-300', 'text-gray-700');
      }
    }

    // Save Changes
    function saveChanges() {
      const formData = {
        email: document.getElementById('email').value,
        secondaryEmail: document.getElementById('secondaryEmail').value,
        contactNumber: document.getElementById('contactNumber').value,
        birthday: document.getElementById('birthday').value,
        address: document.getElementById('address').value,
        gender: document.getElementById('gender').value
      };

      console.log('Saving profile data:', formData);
      
      // Simulate API call
      setTimeout(() => {
        alert('✓ Profile updated successfully!');
        toggleEdit(); // Exit edit mode
      }, 500);
    }

    // Delete Account
    function deleteAccount() {
      const confirmed = confirm('⚠️ Are you sure you want to delete your account? This action cannot be undone.');
      
      if (confirmed) {
        const doubleConfirm = confirm('⚠️ This will permanently delete all your data. Continue?');
        
        if (doubleConfirm) {
          console.log('Account deletion requested');
          alert('Account deletion request submitted. You will receive a confirmation email.');
          // Redirect or handle deletion
          // window.location.href = '/account-deleted';
        }
      }
    }

    // Upload Photo
    function uploadPhoto() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            document.getElementById('profilePhoto').src = event.target.result;
            console.log('Photo uploaded:', file.name);
            alert('✓ Photo uploaded successfully!');
          };
          reader.readAsDataURL(file);
        }
      };
      input.click();
    }

    // Open Gallery
    function openGallery() {
      alert('📷 Opening photo gallery...\n(Feature to be implemented)');
      console.log('Gallery opened');
    }

    // Call Customer
    function callCustomer() {
      const phone = document.getElementById('contactNumber').value;
      alert(`📞 Calling ${phone}...\n(Feature to be implemented)`);
      console.log('Calling:', phone);
    }

    // View Credentials
    function viewCredentials() {
      alert('🪪 Viewing customer credentials...\n(Feature to be implemented)');
      console.log('Credentials viewed');
    }

    // Close Profile
    function closeProfile() {
      const confirmed = confirm('Close profile? Any unsaved changes will be lost.');
      if (confirmed) {
        // Redirect to dashboard or previous page
        window.history.back();
        // Or: window.location.href = '/dashboard';
      }
    }

    // Auto-save draft (every 30 seconds if editing)
    setInterval(() => {
      if (isEditing) {
        const formData = {
          email: document.getElementById('email').value,
          secondaryEmail: document.getElementById('secondaryEmail').value,
          contactNumber: document.getElementById('contactNumber').value,
          birthday: document.getElementById('birthday').value,
          address: document.getElementById('address').value,
          gender: document.getElementById('gender').value
        };
        console.log('Auto-saving draft:', formData);
        // Save to localStorage or send to server
        localStorage.setItem('profileDraft', JSON.stringify(formData));
      }
    }, 30000);

    // Load draft on page load
    window.addEventListener('DOMContentLoaded', () => {
      const draft = localStorage.getItem('profileDraft');
      if (draft) {
        console.log('Draft found, but not auto-applying to preserve user data');
        // Optional: Show a notification that a draft exists
      }
    });
  </script>

</body>
</html>
