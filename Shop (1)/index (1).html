
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REV — Premium Auto Parts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/base.css">

  <style>



/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  #main-nav { padding: 0 1.5rem; }
}

@media (max-width: 600px) {
  .nav-links { gap: 0.75rem; }
}

/* ── Theme: Light Mode Overrides & Toggle Styles ───────────────────── */
/* Use `data-theme="light"` on the <html> element to enable light mode */
[data-theme="light"] {
  --black:       #f5f5f0;
  --dark:        #ffffff;
  --charcoal:    #efefef;
  --graphite:    #e2e2e2;
  --steel:       #d1d1d1;
  --muted:       #666;
  --silver:      #5a5a5a;
  --white:       #0b0b0b;

  --gold:        #c9a84c;
  --gold-light:  #e8c96d;
  --gold-dark:   #8a6820;
  --gold-glow:   rgba(201, 168, 76, 0.08);
  --gold-border: rgba(201, 168, 76, 0.12);
}

/* Theme toggle button in navigation */
.theme-toggle {
  background: none;
  border: none;
  font-size: 1rem;
  padding: 0.4rem 0.6rem;
  border-radius: 4px;
  color: var(--silver);
  cursor: pointer;
  transition: background var(--transition), color var(--transition), transform var(--transition);
}
.theme-toggle:hover { transform: translateY(-2px); color: var(--gold); }
/* ============================================================
   COMPONENTS.CSS
   Reusable UI elements: buttons, form controls, modal,
   toast notification, and cart drawer.
   ============================================================ */


/* ── Buttons ─────────────────────────────────────────────── */
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border: none;
  padding: 0.9rem 2.2rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 0.82rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(201, 168, 76, 0.35);
}

.btn-outline {
  background: none;
  border: 1px solid var(--gold-border);
  color: var(--gold);
  padding: 0.9rem 2.2rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-outline:hover {
  background: var(--gold-glow);
  border-color: var(--gold);
}

.btn-sm-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border: none;
  padding: 0.5rem 1.25rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity var(--transition);
}
.btn-sm-gold:hover { opacity: 0.85; }


/* ── Form Controls ───────────────────────────────────────── */
.f-label {
  font-size: 0.72rem;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 600;
}

.f-input {
  width: 100%;
  background: var(--graphite);
  border: 1px solid var(--steel);
  color: var(--white);
  padding: 0.9rem 1rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  margin-bottom: 1.25rem;
}
.f-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
}
.f-input::placeholder { color: var(--steel); }

.f-select {
  width: 100%;
  background: var(--graphite);
  border: 1px solid var(--steel);
  color: var(--white);
  padding: 0.9rem 1rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 1.25rem;
  cursor: pointer;
}


/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--charcoal);
  border: 1px solid var(--gold-border);
  padding: 2.5rem;
  width: 520px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  animation: scaleIn 0.25s ease;
  position: relative;
}
/* Gold top-line accent */
.modal-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

.modal-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
}

.modal-hd-title {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.modal-x {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.4rem;
  cursor: pointer;
  transition: color var(--transition);
}
.modal-x:hover { color: var(--gold); }

.modal-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.modal-2col .full { grid-column: 1 / -1; }

.modal-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid rgba(201, 168, 76, 0.1);
}

.m-cancel {
  background: none;
  border: 1px solid var(--steel);
  color: var(--muted);
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color var(--transition), color var(--transition);
}
.m-cancel:hover { border-color: var(--silver); color: var(--silver); }

.m-save {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border: none;
  padding: 0.75rem 1.75rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: opacity var(--transition);
}
.m-save:hover { opacity: 0.88; }


/* ── Toast Notification ──────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 500;
  background: var(--charcoal);
  border: 1px solid var(--gold-border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.85rem;
  min-width: 260px;
  max-width: 360px;
  transform: translateY(120px);
  opacity: 0;
  transition: all 0.35s ease;
  position: fixed;
}
/* Left accent bar */
.toast::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--gold-light), var(--gold));
}
.toast.err::before {
  background: linear-gradient(to bottom, #e8603c, #c84444);
}
.toast.show { transform: translateY(0); opacity: 1; }

.toast-ico { font-size: 1.1rem; }
.toast-txt { font-size: 0.88rem; color: var(--silver); font-weight: 400; }


/* ── Cart Drawer ─────────────────────────────────────────── */
.cart-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.75);
  display: none;
  backdrop-filter: blur(6px);
}
.cart-overlay.open { display: block; }

.cart-drawer {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 420px;
  max-width: 100vw;
  z-index: 201;
  background: var(--dark);
  border-left: 1px solid var(--gold-border);
  transform: translateX(100%);
  transition: transform 0.35s ease;
  display: flex;
  flex-direction: column;
}
.cart-drawer.open { transform: translateX(0); }

.cart-hd {
  padding: 2rem;
  border-bottom: 1px solid rgba(201, 168, 76, 0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cart-hd-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: 2px;
}
.cart-hd-title span {
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cart-close-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
  transition: color var(--transition);
}
.cart-close-btn:hover { color: var(--gold); }

.cart-list {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem;
}

/* Individual cart item row */
.cart-row {
  display: flex;
  gap: 1rem;
  padding: 1.25rem;
  background: var(--charcoal);
  border: 1px solid transparent;
  margin-bottom: 0.75rem;
  transition: border-color var(--transition);
  position: relative;
}
.cart-row:hover { border-color: var(--gold-border); }

.cart-row-img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  flex-shrink: 0;
  filter: brightness(0.9);
}

.cart-row-info { flex: 1; }

.cart-row-name {
  font-family: var(--font-sans);
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--white);
  line-height: 1.35;
  margin-bottom: 0.3rem;
}

.cart-row-price {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cart-row-qty {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.qty-b {
  background: var(--graphite);
  border: 1px solid var(--steel);
  color: var(--white);
  width: 24px; height: 24px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: border-color var(--transition), color var(--transition);
}
.qty-b:hover { border-color: var(--gold); color: var(--gold); }

.qty-n {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  min-width: 24px;
  text-align: center;
  color: var(--white);
}

.cart-rm {
  position: absolute;
  top: 10px; right: 10px;
  background: none;
  border: none;
  color: var(--steel);
  cursor: pointer;
  font-size: 0.85rem;
  transition: color var(--transition);
}
.cart-rm:hover { color: var(--gold); }

/* Empty cart state */
.cart-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 2rem;
  text-align: center;
  color: var(--muted);
}
.cart-empty-icon {
  font-family: var(--font-display);
  font-size: 3rem;
  margin-bottom: 1rem;
  color: var(--steel);
}

/* Cart footer */
.cart-ft {
  padding: 1.5rem 2rem;
  border-top: 1px solid rgba(201, 168, 76, 0.15);
}

.cart-subtotal {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1.5rem;
}
.cart-subtotal-l {
  font-size: 0.75rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
}
.cart-subtotal-v {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.checkout-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border: none;
  padding: 1rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 0.82rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
}
.checkout-btn:hover { opacity: 0.9; transform: translateY(-1px); }


/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 600px) {
  .modal-2col { grid-template-columns: 1fr; }
}
/* ============================================================
   SHOP.CSS
   Home page hero section, stats strip, shop page header,
   filter buttons, search row, and product grid / cards.
   ============================================================ */


/* ── Hero Section ────────────────────────────────────────── */
.hero {
  min-height: calc(100vh - var(--nav-h));
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 4rem 3rem;
  position: relative;
  overflow: hidden;
}

/* Radial gold ambient glow */
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 80% at 70% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
}

/* Vertical divider line */
.hero-bg-lines {
  position: absolute; inset: 0; z-index: 0; overflow: hidden;
}
.hero-bg-lines::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 100%;
  background: linear-gradient(to bottom, transparent, var(--gold-border), transparent);
}

.hero-left { position: relative; z-index: 1; }

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2rem;
  animation: fadeUp 0.8s ease both;
}
.hero-eyebrow::before {
  content: '';
  width: 30px; height: 1px;
  background: var(--gold);
}

.hero-h1 {
  font-family: var(--font-display);
  font-size: clamp(3.5rem, 6vw, 6.5rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 1px;
  color: var(--white);
  animation: fadeUp 0.8s 0.1s ease both;
}
.hero-h1 strong {
  font-weight: 900;
  display: block;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-divider {
  width: 80px; height: 1px;
  background: linear-gradient(to right, var(--gold), transparent);
  margin: 2rem 0;
  animation: fadeUp 0.8s 0.2s ease both;
}

.hero-p {
  font-size: 1rem;
  color: var(--silver);
  line-height: 1.75;
  max-width: 440px;
  letter-spacing: 0.2px;
  font-weight: 300;
  animation: fadeUp 0.8s 0.3s ease both;
}

.hero-ctas {
  display: flex;
  gap: 1rem;
  margin-top: 2.5rem;
  animation: fadeUp 0.8s 0.4s ease both;
}

/* Right column — framed image */
.hero-right {
  position: relative; z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 1.2s 0.3s ease both;
}

.hero-img-frame {
  position: relative;
  width: 100%;
  max-width: 520px;
}
.hero-img-frame img {
  width: 100%; height: 460px;
  object-fit: cover;
  filter: brightness(0.85) contrast(1.1);
  display: block;
}
/* Offset border effect */
.hero-img-frame::before {
  content: '';
  position: absolute;
  top: -10px; left: -10px; right: 10px; bottom: 10px;
  border: 1px solid var(--gold-border);
  z-index: -1;
}
/* Bottom fade on image */
.hero-img-frame::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(8,8,8,0.5) 0%, transparent 50%);
}

/* Caption tag overlaid on hero image */
.hero-img-tag {
  position: absolute;
  bottom: 20px; left: 20px;
  z-index: 2;
  background: rgba(8, 8, 8, 0.9);
  border: 1px solid var(--gold-border);
  padding: 0.75rem 1.25rem;
  backdrop-filter: blur(10px);
}
.hero-img-tag-label {
  font-size: 0.68rem;
  letter-spacing: 2.5px;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 600;
}
.hero-img-tag-value {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--white);
  margin-top: 3px;
  letter-spacing: 0.5px;
}


/* ── Stats Strip ─────────────────────────────────────────── */
.stats-strip {
  border-top: 1px solid rgba(201, 168, 76, 0.15);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}

.stat-item {
  padding: 2.5rem 2rem;
  text-align: center;
  border-right: 1px solid rgba(201, 168, 76, 0.1);
  position: relative;
}
.stat-item:last-child { border-right: none; }

/* Gold tick above each stat */
.stat-item::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 3px;
  background: var(--gold);
}

.stat-n {
  font-family: var(--font-display);
  font-size: 3.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.stat-l {
  font-size: 0.72rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 0.4rem;
  font-weight: 500;
}


/* ── Shop Page Header ────────────────────────────────────── */
.shop-bar {
  padding: 3rem 3rem 2rem;
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.shop-title {
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 800;
  letter-spacing: 2px;
}
.shop-title span {
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
}

/* ── Filter Pills ─────────────────────────────────────────── */
.filters {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.f-btn {
  background: none;
  border: 1px solid var(--steel);
  color: var(--muted);
  padding: 0.45rem 1.1rem;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all var(--transition);
}
.f-btn:hover { border-color: var(--gold); color: var(--gold); }
.f-btn.active {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border-color: transparent;
}


/* ── Search & Sort Row ───────────────────────────────────── */
.search-row {
  padding: 1.5rem 3rem;
  border-bottom: 1px solid rgba(201, 168, 76, 0.08);
  display: flex;
  gap: 1rem;
  align-items: center;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 1rem; top: 50%;
  transform: translateY(-50%);
  color: var(--gold);
  font-size: 0.85rem;
  pointer-events: none;
}
.s-input {
  width: 100%;
  background: var(--charcoal);
  border: 1px solid var(--steel);
  border-radius: var(--radius);
  color: var(--white);
  padding: 0.75rem 1rem 0.75rem 2.5rem;
  font-family: var(--font-sans);
  font-size: 0.9rem;
  outline: none;
  transition: border-color var(--transition);
}
.s-input:focus { border-color: var(--gold); }
.s-input::placeholder { color: var(--steel); }

.sort-sel {
  background: var(--charcoal);
  border: 1px solid var(--steel);
  color: var(--silver);
  padding: 0.75rem 1rem;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  outline: none;
  cursor: pointer;
  min-width: 160px;
}


/* ── Product Grid ────────────────────────────────────────── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  /* spacing between slots so cards don’t touch */
  gap: 1rem;
  /* optional outer padding to keep cards off the container edges */
  padding: 0.5rem;
  /* drop the faint line effect now that there's more space */
  background: none;
}

/* No results message */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 6rem 2rem;
  color: var(--muted);
}
.no-results .big {
  font-family: var(--font-display);
  font-size: 4rem;
  color: var(--steel);
  margin-bottom: 1rem;
}


/* ── Product Card ────────────────────────────────────────── */
.p-card {
  background: var(--dark);
  overflow: hidden;
  transition: background var(--transition);
  position: relative;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}
.p-card:hover { background: var(--charcoal); }

/* Image wrapper */
.p-img-wrap {
  position: relative;
  height: 220px;
  overflow: hidden;
}
.p-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
  filter: brightness(0.85) contrast(1.05) saturate(0.9);
}
.p-card:hover .p-img-wrap img { transform: scale(1.06); }

.p-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(8,8,8,0.7) 0%, rgba(8,8,8,0.1) 50%, transparent 100%);
}

.p-badge {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 2;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  font-size: 0.58rem;
  font-weight: 900;
  padding: 0.25rem 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.p-category-tag {
  position: absolute;
  bottom: 14px; right: 14px;
  z-index: 2;
  border: 1px solid var(--gold-border);
  background: rgba(8, 8, 8, 0.8);
  color: var(--gold);
  font-size: 0.58rem;
  padding: 0.2rem 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  backdrop-filter: blur(6px);
}

/* Card body */
.p-body {
  padding: 1.5rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.p-sku {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.p-name {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  line-height: 1.25;
  margin-bottom: 0.5rem;
  letter-spacing: 0.3px;
}

.p-desc {
  font-size: 0.875rem;
  color: var(--silver);
  line-height: 1.65;
  flex: 1;
  margin-bottom: 1rem;
  font-weight: 300;
}

.p-stock-warn {
  font-size: 0.72rem;
  color: #c87533;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

/* Price + CTA row */
.p-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 1rem;
  border-top: 1px solid rgba(201, 168, 76, 0.1);
}

.p-price {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.p-orig {
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: line-through;
  margin-left: 6px;
  font-family: var(--font-sans);
}

.add-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border: none;
  width: 42px; height: 42px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
  font-weight: 900;
}
.add-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
}

.out-label {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0.5rem 1rem;
  border: 1px solid var(--steel);
}


/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .hero                { grid-template-columns: 1fr; }
  .hero-right          { display: none; }
  .shop-bar,
  .search-row          { padding-left: 1.5rem; padding-right: 1.5rem; }
}

@media (max-width: 600px) {
  .stats-strip { grid-template-columns: repeat(2, 1fr); }
}

/* ============================================================
   store.js — Centralised product state
   Single source of truth. Exposes read methods and mutations.
   Notifies subscribers (pages) whenever data changes.
   ============================================================ */

const Store = (() => {
  // Deep-copy seed data so the original is never mutated
  let _products = SEED_PRODUCTS.map(p => ({ ...p }));
  let _nextId   = _products.length + 1;

  // ── Subscriber registry ──────────────────────────────────
  const _listeners = [];

  function subscribe(fn) {
    _listeners.push(fn);
  }

  function _notify() {
    _listeners.forEach(fn => fn());
  }

  // ── Getters ──────────────────────────────────────────────

  /** Return a shallow copy of all products */
  function getAll() {
    return [..._products];
  }

  /** Find a single product by id */
  function getById(id) {
    return _products.find(p => p.id === id) || null;
  }

  /**
   * Return products filtered by category and/or search query.
   * @param {Object} opts  { category: string, query: string }
   */
  function getFiltered({ category = 'all', query = '' } = {}) {
    const q = query.toLowerCase().trim();
    return _products.filter(p => {
      const matchCat = category === 'all' || p.cat === category;
      const matchQ   = !q
        || p.name.toLowerCase().includes(q)
        || p.cat.toLowerCase().includes(q)
        || p.sku.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
  }

  /** Products with stock at or below the given threshold */
  function getLowStock(threshold = 5) {
    return _products.filter(p => p.stock <= threshold);
  }

  function getTotalCount()    { return _products.length; }
  function getCategories()    { return [...new Set(_products.map(p => p.cat))]; }

  /** Rough revenue estimate based on simulated sales */
  function getSimulatedRevenue() {
    return _products.reduce((sum, p) => sum + p.price * Math.max(0, 50 - p.stock), 0);
  }

  // ── Mutations ────────────────────────────────────────────

  function add(data) {
    _products.push({ id: _nextId++, ...data });
    _notify();
  }

  function update(id, data) {
    const idx = _products.findIndex(p => p.id === id);
    if (idx === -1) return false;
    _products[idx] = { ..._products[idx], ...data };
    _notify();
    return true;
  }

  function remove(id) {
    const before = _products.length;
    _products = _products.filter(p => p.id !== id);
    const removed = _products.length < before;
    if (removed) _notify();
    return removed;
  }

  function adjustStock(id, delta) {
    const p = getById(id);
    if (!p) return false;
    return update(id, { stock: Math.max(0, p.stock + delta) });
  }

  // ── Public API ───────────────────────────────────────────
  return {
    subscribe,
    getAll,
    getById,
    getFiltered,
    getLowStock,
    getTotalCount,
    getCategories,
    getSimulatedRevenue,
    add,
    update,
    remove,
    adjustStock,
  };
})();

/* ============================================================
   toast.js — Lightweight notification helper
   Usage:
     Toast.success('Item added to cart')
     Toast.error('Invalid credentials')
     Toast.info('Stock updated')
   ============================================================ */

const Toast = (() => {
  let _timer = null;

  function _show(type, icon, message) {
    const el  = document.getElementById('toast');
    const ico = document.getElementById('t-ico');
    const msg = document.getElementById('t-msg');

    ico.textContent = icon;
    msg.textContent = message;
    el.className    = `toast ${type === 'error' ? 'err' : ''} show`;

    clearTimeout(_timer);
    _timer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  return {
    success: (msg) => _show('success', '✦',  msg),
    error:   (msg) => _show('error',   '✕',  msg),
    info:    (msg) => _show('info',    '→',  msg),
  };
})();

/* ============================================================
   cart.js — Shopping cart state, rendering, and drawer UI
   ============================================================ */

const Cart = (() => {
  let _items = []; // [{ ...product, qty: number }]

  // ── Internal helpers ─────────────────────────────────────

  function _find(id) {
    return _items.find(i => i.id === id);
  }

  function _updateBadge() {
    const total = _items.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('cart-badge').textContent = total;
  }

  const FALLBACK_IMG = 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=200&q=80';

  // ── Mutations ────────────────────────────────────────────

  function addItem(productId) {
    const product = Store.getById(productId);
    if (!product) return;

    const existing = _find(productId);
    if (existing) {
      existing.qty++;
    } else {
      _items.push({ ...product, qty: 1 });
    }

    _updateBadge();
    Toast.success(`${product.name} added to cart`);
  }

  function changeQty(productId, delta) {
    const item = _find(productId);
    if (!item) return;

    item.qty += delta;
    if (item.qty <= 0) {
      _items = _items.filter(i => i.id !== productId);
    }

    _updateBadge();
    _renderList();
  }

  function removeItem(productId) {
    _items = _items.filter(i => i.id !== productId);
    _updateBadge();
    _renderList();
  }

  function checkout() {
    if (!_items.length) {
      Toast.error('Your cart is empty');
      return;
    }
    Toast.success('Order placed — thank you!');
    _items = [];
    _updateBadge();
    _renderList();
    close();
  }

  // ── Rendering ────────────────────────────────────────────

  function _renderList() {
    const list = document.getElementById('cart-list');

    if (!_items.length) {
      list.innerHTML = `
        <div class="cart-empty-state">
          <div class="cart-empty-icon">✦</div>
          <p style="letter-spacing:2px;font-size:.82rem">Your cart is empty</p>
        </div>`;
      document.getElementById('cart-total').textContent = '$0.00';
      return;
    }

    list.innerHTML = _items.map(item => `
      <div class="cart-row">
        <img class="cart-row-img"
          src="${item.img}"
          alt="${item.name}"
          onerror="this.src='${FALLBACK_IMG}'">
        <div class="cart-row-info">
          <div class="cart-row-name">${item.name}</div>
          <div class="cart-row-price">$${(item.price * item.qty).toFixed(2)}</div>
          <div class="cart-row-qty">
            <button class="qty-b" onclick="Cart.changeQty(${item.id}, -1)">−</button>
            <span class="qty-n">${item.qty}</span>
            <button class="qty-b" onclick="Cart.changeQty(${item.id},  1)">+</button>
          </div>
        </div>
        <button class="cart-rm" onclick="Cart.removeItem(${item.id})">✕</button>
      </div>`).join('');

    const total = _items.reduce((sum, i) => sum + i.price * i.qty, 0);
    document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
  }

  // ── Drawer UI ────────────────────────────────────────────

  function open() {
    _renderList();
    document.getElementById('cart-overlay').classList.add('open');
    document.getElementById('cart-drawer').classList.add('open');
  }

  function close() {
    document.getElementById('cart-overlay').classList.remove('open');
    document.getElementById('cart-drawer').classList.remove('open');
  }

  // ── Public API ───────────────────────────────────────────
  return { addItem, changeQty, removeItem, checkout, open, close };
})();

/* ============================================================
   pages/shop.js — Shop catalog page
   Handles category filters, search, sort, and product grid.
   ============================================================ */

const ShopPage = (() => {
  let _activeCategory = 'all';

  const CATEGORIES = ['Engine', 'Brakes', 'Electrical', 'Suspension', 'Accessories', 'Exhaust'];
  const FALLBACK_IMG = 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600&q=80';

  // ── Public: initial render ───────────────────────────────

  function render() {
    document.getElementById('page-shop').innerHTML = _shellTemplate();
    renderGrid();
  }

  // ── Public: filter + grid ────────────────────────────────

  function setFilter(category, btn) {
    _activeCategory = category;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('products-grid');
    if (!grid) return;

    const query = document.getElementById('search-q')?.value || '';
    const sort  = document.getElementById('sort-sel')?.value  || 'default';

    let items = Store.getFiltered({ category: _activeCategory, query });

    // Apply sort
    if (sort === 'price-asc')  items.sort((a, b) => a.price - b.price);
    if (sort === 'price-desc') items.sort((a, b) => b.price - a.price);
    if (sort === 'name')       items.sort((a, b) => a.name.localeCompare(b.name));

    if (!items.length) {
      grid.innerHTML = `
        <div class="no-results">
          <div class="big">∅</div>
          <p>No products found</p>
        </div>`;
      return;
    }

    grid.innerHTML = items.map(_productCard).join('');
  }

  // ── Templates ────────────────────────────────────────────

  function _shellTemplate() {
    const filterBtns = ['all', ...CATEGORIES].map(cat => {
      const label  = cat === 'all' ? 'All' : cat;
      const active = _activeCategory === cat ? 'active' : '';
      return `<button class="f-btn ${active}" onclick="ShopPage.setFilter('${cat}', this)">${label}</button>`;
    }).join('');

    return `
      <div class="shop-bar">
        <div class="shop-title">The <span>Catalog</span></div>
        <div class="filters" id="cat-filters">${filterBtns}</div>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input
            class="s-input"
            type="text"
            id="search-q"
            placeholder="Search by name, category, or SKU…"
            oninput="ShopPage.renderGrid()">
        </div>
        <select class="sort-sel" id="sort-sel" onchange="ShopPage.renderGrid()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="name">Name A → Z</option>
        </select>
      </div>

      <div class="products-grid" id="products-grid"></div>
    `;
  }

  function _productCard(p) {
    const badge    = p.badge ? `<div class="p-badge">${p.badge}</div>` : '';
    const origPrc  = p.orig  ? `<span class="p-orig">$${p.orig.toFixed(2)}</span>` : '';

    const stockNote = p.stock === 0
      ? `<div class="p-stock-warn">✕ Out of stock</div>`
      : p.stock <= 5
        ? `<div class="p-stock-warn">⚠ Only ${p.stock} remaining</div>`
        : '';

    const cta = p.stock > 0
      ? `<button class="add-btn" onclick="Cart.addItem(${p.id})" title="Add to cart">+</button>`
      : `<span class="out-label">Unavailable</span>`;

    return `
      <div class="p-card">
        <div class="p-img-wrap">
          ${badge}
          <img
            src="${p.img}"
            alt="${p.name}"
            loading="lazy"
            onerror="this.src='${FALLBACK_IMG}'">
          <div class="p-img-overlay"></div>
          <div class="p-category-tag">${p.cat}</div>
        </div>
        <div class="p-body">
          <div class="p-sku">${p.sku}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-desc">${p.desc}</div>
          ${stockNote}
          <div class="p-footer">
            <div class="p-price-wrap">
              <span class="p-price">$${p.price.toFixed(2)}</span>
              ${origPrc}
            </div>
            ${cta}
          </div>
        </div>
      </div>`;
  }

  // Re-render grid whenever store data changes
  Store.subscribe(() => {
    if (document.getElementById('products-grid')) renderGrid();
  });

  return { render, setFilter, renderGrid };
})();

/* Theme toggle + persistence for Apex Motors
   - Stores choice in localStorage under 'apex_theme'
   - Applies `data-theme="light"` to <html> for light mode
*/
(function(){
  const KEY = 'apex_theme';
  const html = document.documentElement;
  const TOGGLE_ID = 'theme-toggle';

  function applyTheme(theme){
    if(theme === 'light') html.setAttribute('data-theme','light');
    else html.removeAttribute('data-theme');

    const btn = document.getElementById(TOGGLE_ID);
    if(btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
    try { localStorage.setItem(KEY, theme); } catch(e) {}
  }

  function init(){
    const saved = localStorage.getItem(KEY);
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const defaultTheme = saved || (prefersDark ? 'dark' : 'dark');
    applyTheme(defaultTheme);

    document.addEventListener('click', (e)=>{
      const t = e.target;
      if(!t) return;
      if(t.id === TOGGLE_ID){
        const cur = html.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        applyTheme(cur === 'light' ? 'dark' : 'light');
      }
    });
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();


  const Router = (() => {
    const PAGE_IDS = ['home', 'shop'];
    function go(page) {
      PAGE_IDS.forEach(id => {
        document.getElementById('page-' + id)?.classList.remove('active');
        document.getElementById('nav-' + id)?.classList.remove('active');
      });
      document.getElementById('page-' + page)?.classList.add('active');
      document.getElementById('nav-' + page)?.classList.add('active');
      if (page === 'home') HomePage.render();
      if (page === 'shop') ShopPage.render();
    }
    function init() { HomePage.render(); }
    return { go, init };
  })();

  Router.init();
  </script>

</body>
