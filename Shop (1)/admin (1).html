/* ============================================================
   store.js — Centralised product state
   Single source of truth. Exposes read methods and mutations.
   Notifies subscribers (pages) whenever data changes.
   ============================================================ */

const Store = (() => {
  // Deep-copy seed data so the original is never mutated
  let _products = SEED_PRODUCTS.map(p => ({ ...p }));
  let _nextId   = _products.length + 1;

  // ── Subscriber registry ──────────────────────────────────
  const _listeners = [];

  function subscribe(fn) {
    _listeners.push(fn);
  }

  function _notify() {
    _listeners.forEach(fn => fn());
  }

  // ── Getters ──────────────────────────────────────────────

  /** Return a shallow copy of all products */
  function getAll() {
    return [..._products];
  }

  /** Find a single product by id */
  function getById(id) {
    return _products.find(p => p.id === id) || null;
  }

  /**
   * Return products filtered by category and/or search query.
   * @param {Object} opts  { category: string, query: string }
   */
  function getFiltered({ category = 'all', query = '' } = {}) {
    const q = query.toLowerCase().trim();
    return _products.filter(p => {
      const matchCat = category === 'all' || p.cat === category;
      const matchQ   = !q
        || p.name.toLowerCase().includes(q)
        || p.cat.toLowerCase().includes(q)
        || p.sku.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
  }

  /** Products with stock at or below the given threshold */
  function getLowStock(threshold = 5) {
    return _products.filter(p => p.stock <= threshold);
  }

  function getTotalCount()    { return _products.length; }
  function getCategories()    { return [...new Set(_products.map(p => p.cat))]; }

  /** Rough revenue estimate based on simulated sales */
  function getSimulatedRevenue() {
    return _products.reduce((sum, p) => sum + p.price * Math.max(0, 50 - p.stock), 0);
  }

  // ── Mutations ────────────────────────────────────────────

  function add(data) {
    _products.push({ id: _nextId++, ...data });
    _notify();
  }

  function update(id, data) {
    const idx = _products.findIndex(p => p.id === id);
    if (idx === -1) return false;
    _products[idx] = { ..._products[idx], ...data };
    _notify();
    return true;
  }

  function remove(id) {
    const before = _products.length;
    _products = _products.filter(p => p.id !== id);
    const removed = _products.length < before;
    if (removed) _notify();
    return removed;
  }

  function adjustStock(id, delta) {
    const p = getById(id);
    if (!p) return false;
    return update(id, { stock: Math.max(0, p.stock + delta) });
  }

  // ── Public API ───────────────────────────────────────────
  return {
    subscribe,
    getAll,
    getById,
    getFiltered,
    getLowStock,
    getTotalCount,
    getCategories,
    getSimulatedRevenue,
    add,
    update,
    remove,
    adjustStock,
  };
})();

/* ============================================================
   toast.js — Lightweight notification helper
   Usage:
     Toast.success('Item added to cart')
     Toast.error('Invalid credentials')
     Toast.info('Stock updated')
   ============================================================ */

const Toast = (() => {
  let _timer = null;

  function _show(type, icon, message) {
    const el  = document.getElementById('toast');
    const ico = document.getElementById('t-ico');
    const msg = document.getElementById('t-msg');

    ico.textContent = icon;
    msg.textContent = message;
    el.className    = `toast ${type === 'error' ? 'err' : ''} show`;

    clearTimeout(_timer);
    _timer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  return {
    success: (msg) => _show('success', '✦',  msg),
    error:   (msg) => _show('error',   '✕',  msg),
    info:    (msg) => _show('info',    '→',  msg),
  };
})();

/* ============================================================
   pages/admin.js — Admin portal
   Handles login/logout, dashboard overview, product CRUD,
   inventory management, and the product modal.
   ============================================================ */

const AdminPage = (() => {
  // ── Config ───────────────────────────────────────────────
  const CREDENTIALS = { user: 'admin', pass: 'apex2024' };
  const FALLBACK_IMG = 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=200&q=80';

  // ── State ────────────────────────────────────────────────
  let _loggedIn  = false;
  let _activeTab = 'overview';
  let _editingId = null;

  // ── Public: render ───────────────────────────────────────

  function render() {
    document.getElementById('page-admin').innerHTML = _template();
    if (_loggedIn) _refreshDashboard();
  }

  // ── Auth ─────────────────────────────────────────────────

  function login() {
    const u = document.getElementById('l-user')?.value;
    const p = document.getElementById('l-pass')?.value;

    if (u === CREDENTIALS.user && p === CREDENTIALS.pass) {
      _loggedIn = true;
      render();
      Toast.success('Welcome back, Admin');
    } else {
      Toast.error('Invalid credentials');
    }
  }

  function logout() {
    _loggedIn = false;
    render();
    Toast.info('Signed out');
  }

  // ── Tab switching ─────────────────────────────────────────

  function switchTab(tabId, el) {
    _activeTab = tabId;
    document.querySelectorAll('.a-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tabId)?.classList.add('active');
    document.querySelectorAll('.a-nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    _refreshDashboard();
  }

  // ── Product CRUD ──────────────────────────────────────────

  function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    Store.remove(id);
    Toast.success('Product deleted');
  }

  function adjustStock(id, delta) {
    Store.adjustStock(id, delta);
  }

  // ── Modal ─────────────────────────────────────────────────

  function openModal(id = null) {
    _editingId = id;
    document.getElementById('modal-title').textContent = id ? 'Edit Product' : 'Add Product';

    // Clear all fields
    ['p-name','p-cat','p-icon','p-price','p-orig','p-stock','p-sku','p-badge','p-img','p-desc']
      .forEach(fieldId => {
        const el = document.getElementById(fieldId);
        if (el) el.value = '';
      });

    // Populate if editing
    if (id) {
      const p = Store.getById(id);
      if (!p) return;
      document.getElementById('p-name').value  = p.name;
      document.getElementById('p-cat').value   = p.cat;
      document.getElementById('p-icon').value  = p.icon;
      document.getElementById('p-price').value = p.price;
      document.getElementById('p-orig').value  = p.orig  || '';
      document.getElementById('p-stock').value = p.stock;
      document.getElementById('p-sku').value   = p.sku;
      document.getElementById('p-badge').value = p.badge || '';
      document.getElementById('p-img').value   = p.img   || '';
      document.getElementById('p-desc').value  = p.desc;
    }

    document.getElementById('product-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('product-modal').classList.remove('open');
    _editingId = null;
  }

  function saveProduct() {
    const name  = document.getElementById('p-name').value.trim();
    const price = parseFloat(document.getElementById('p-price').value);
    const stock = parseInt(document.getElementById('p-stock').value);

    if (!name || isNaN(price) || isNaN(stock)) {
      Toast.error('Please fill in Name, Price and Stock');
      return;
    }

    const data = {
      name,
      cat:   document.getElementById('p-cat').value,
      icon:  document.getElementById('p-icon').value  || '🔧',
      price,
      orig:  parseFloat(document.getElementById('p-orig').value)  || null,
      stock,
      sku:   document.getElementById('p-sku').value   || `AUTO-${Date.now()}`,
      badge: document.getElementById('p-badge').value || null,
      img:   document.getElementById('p-img').value   || FALLBACK_IMG,
      desc:  document.getElementById('p-desc').value,
    };

    if (_editingId) {
      Store.update(_editingId, data);
      Toast.success('Product updated');
    } else {
      Store.add(data);
      Toast.success('Product added');
    }

    closeModal();
  }

  // ── Private: dashboard refresh ────────────────────────────

  function _refreshDashboard() {
    if (!_loggedIn) return;

    const products = Store.getAll();

    // Stat cards
    _set('dc-total', Store.getTotalCount());
    _set('dc-rev',   '$' + Math.round(Store.getSimulatedRevenue() / 1000) + 'K');
    _set('dc-low',   Store.getLowStock().length);
    _set('dc-cats',  Store.getCategories().length);

    // Overview: last 5 products
    _renderTable('ov-tbody', products.slice(-5).reverse(), _overviewRow);

    // Products: all products
    _renderTable('prod-tbody', products, _productRow);

    // Inventory: all products
    _renderTable('inv-tbody', products, _inventoryRow);
  }

  function _renderTable(tbodyId, rows, rowFn) {
    const tbody = document.getElementById(tbodyId);
    if (tbody) tbody.innerHTML = rows.map(rowFn).join('');
  }

  // ── Private: row templates ────────────────────────────────

  function _overviewRow(p) {
    return `
      <tr>
        <td><img class="td-img" src="${p.img}" alt="" onerror="this.src='${FALLBACK_IMG}'"></td>
        <td><strong style="font-family:var(--font-display)">${p.name}</strong></td>
        <td style="color:var(--muted);font-size:.78rem;letter-spacing:.5px">${p.cat}</td>
        <td style="font-family:var(--font-display);font-size:1.05rem;color:var(--gold)">$${p.price.toFixed(2)}</td>
        <td>${_stockBadge(p.stock)}</td>
      </tr>`;
  }

  function _productRow(p) {
    return `
      <tr>
        <td><img class="td-img" src="${p.img}" alt="" onerror="this.src='${FALLBACK_IMG}'"></td>
        <td>
          <strong style="font-family:var(--font-display)">${p.name}</strong><br>
          <span style="font-family:var(--font-mono);font-size:.68rem;color:var(--muted)">${p.sku}</span>
        </td>
        <td style="color:var(--muted);font-size:.78rem">${p.cat}</td>
        <td style="font-family:var(--font-display);font-size:1.05rem;color:var(--gold)">$${p.price.toFixed(2)}</td>
        <td>${p.stock}</td>
        <td>${_stockBadge(p.stock)}</td>
        <td style="display:flex;gap:.4rem;flex-wrap:wrap">
          <button class="a-edit-btn" onclick="AdminPage.openModal(${p.id})">Edit</button>
          <button class="a-del-btn"  onclick="AdminPage.deleteProduct(${p.id})">Delete</button>
        </td>
      </tr>`;
  }

  function _inventoryRow(p) {
    return `
      <tr>
        <td><img class="td-img" src="${p.img}" alt="" onerror="this.src='${FALLBACK_IMG}'"></td>
        <td><strong style="font-family:var(--font-display)">${p.name}</strong></td>
        <td style="font-family:var(--font-mono);font-size:.72rem;color:var(--muted)">${p.sku}</td>
        <td><strong>${p.stock}</strong></td>
        <td>${_stockBadge(p.stock)}</td>
        <td>
          <div class="inv-grp">
            <button class="inv-b"        onclick="AdminPage.adjustStock(${p.id}, -1)">−</button>
            <button class="inv-b inv-b-plus" onclick="AdminPage.adjustStock(${p.id},  1)">+</button>
            <button class="inv-b-ten"    onclick="AdminPage.adjustStock(${p.id}, 10)">+10</button>
          </div>
        </td>
      </tr>`;
  }

  function _stockBadge(stock) {
    if (stock === 0)  return '<span class="st-badge st-out">Out of Stock</span>';
    if (stock <= 5)   return '<span class="st-badge st-low">Low Stock</span>';
    return '<span class="st-badge st-in">In Stock</span>';
  }

  function _set(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  // ── Private: page template ───────────────────────────────

  function _template() {
    return `
      <!-- Login screen (shown when logged out) -->
      <div class="admin-login-wrap" id="admin-login"
           style="display:${_loggedIn ? 'none' : 'flex'}">
        <div class="login-card">
          <div class="login-card-logo">rev</div>
          <div class="login-card-sub">Admin Portal</div>

          <label class="f-label">Username</label>
          <input class="f-input" type="text" id="l-user" placeholder="admin">

          <label class="f-label">Password</label>
          <input class="f-input" type="password" id="l-pass" placeholder="••••••••"
            onkeydown="if(event.key==='Enter') AdminPage.login()">

          <button class="btn-gold login-btn" onclick="AdminPage.login()">Sign In</button>
          <div class="login-hint">
            Credentials: <code>admin</code> / <code>apex2024</code>
          </div>
        </div>
      </div>

      <!-- Dashboard (shown when logged in) -->
      <div class="admin-shell ${_loggedIn ? 'visible' : ''}" id="admin-shell">

        <div class="admin-top">
          <div class="admin-top-title">⚙ Admin Dashboard</div>
          <div class="admin-top-right">
            <span class="admin-top-user">Signed in as <strong>admin</strong></span>
            <button class="logout-btn" onclick="AdminPage.logout()">Logout</button>
          </div>
        </div>

        <div class="admin-body">

          <!-- Sidebar -->
          <div class="admin-nav">
            <div class="a-nav-item ${_activeTab === 'overview'  ? 'active' : ''}"
                 onclick="AdminPage.switchTab('overview', this)">📊 Overview</div>
            <div class="a-nav-item ${_activeTab === 'products'  ? 'active' : ''}"
                 onclick="AdminPage.switchTab('products', this)">📦 Products</div>
            <div class="a-nav-item ${_activeTab === 'inventory' ? 'active' : ''}"
                 onclick="AdminPage.switchTab('inventory', this)">🗃 Inventory</div>
            <div class="a-nav-item ${_activeTab === 'orders'    ? 'active' : ''}"
                 onclick="AdminPage.switchTab('orders', this)">🛒 Orders</div>
          </div>

          <!-- Content -->
          <div class="admin-content">

            <!-- Overview tab -->
            <div class="a-tab ${_activeTab === 'overview' ? 'active' : ''}" id="tab-overview">
              <div class="dash-grid">
                <div class="dash-card">
                  <div class="dc-label">Total Products</div>
                  <div class="dc-val" id="dc-total">0</div>
                  <div class="dc-sub">In catalog</div>
                </div>
                <div class="dash-card">
                  <div class="dc-label">Revenue Est.</div>
                  <div class="dc-val" id="dc-rev">$0</div>
                  <div class="dc-sub">Simulated</div>
                </div>
                <div class="dash-card alert">
                  <div class="dc-label">Low Stock</div>
                  <div class="dc-val" id="dc-low">0</div>
                  <div class="dc-sub">Need restock</div>
                </div>
                <div class="dash-card">
                  <div class="dc-label">Categories</div>
                  <div class="dc-val" id="dc-cats">0</div>
                  <div class="dc-sub">Active</div>
                </div>
              </div>
              <div class="sec-hd"><div class="sec-title">Recent Products</div></div>
              <table class="a-table">
                <thead>
                  <tr><th></th><th>Product</th><th>Category</th><th>Price</th><th>Status</th></tr>
                </thead>
                <tbody id="ov-tbody"></tbody>
              </table>
            </div>

            <!-- Products tab -->
            <div class="a-tab ${_activeTab === 'products' ? 'active' : ''}" id="tab-products">
              <div class="sec-hd">
                <div class="sec-title">All Products</div>
                <button class="btn-sm-gold" onclick="AdminPage.openModal()">+ Add Product</button>
              </div>
              <table class="a-table">
                <thead>
                  <tr>
                    <th></th><th>Product</th><th>Category</th>
                    <th>Price</th><th>Stock</th><th>Status</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody id="prod-tbody"></tbody>
              </table>
            </div>

            <!-- Inventory tab -->
            <div class="a-tab ${_activeTab === 'inventory' ? 'active' : ''}" id="tab-inventory">
              <div class="sec-hd"><div class="sec-title">Inventory Management</div></div>
              <table class="a-table">
                <thead>
                  <tr><th></th><th>Product</th><th>SKU</th><th>Stock</th><th>Status</th><th>Adjust</th></tr>
                </thead>
                <tbody id="inv-tbody"></tbody>
              </table>
            </div>

            <!-- Orders tab -->
            <div class="a-tab ${_activeTab === 'orders' ? 'active' : ''}" id="tab-orders">
              <div class="sec-hd"><div class="sec-title">Order History</div></div>
              <div class="orders-placeholder">

            </div>

          </div><!-- /admin-content -->
        </div><!-- /admin-body -->
      </div><!-- /admin-shell -->

  // Re-render tables whenever store data changes
  Store.subscribe(() => {

  // ── Public API ────────────────────────────────────────────
  return {
    render,
    login,
    logout,
    switchTab,
    openModal,
    closeModal,
    saveProduct,
    deleteProduct,
    adjustStock,
  };
})();

// Alias used by HTML onclick handlers
const Admin = AdminPage;

/* Theme toggle + persistence for Apex Motors
   - Stores choice in localStorage under 'apex_theme'
   - Applies `data-theme="light"` to <html> for light mode
*/
(function(){
  const KEY = 'apex_theme';
  const html = document.documentElement;
  const TOGGLE_ID = 'theme-toggle';

  function applyTheme(theme){
    if(theme === 'light') html.setAttribute('data-theme','light');
    else html.removeAttribute('data-theme');

    const btn = document.getElementById(TOGGLE_ID);
    if(btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
    try { localStorage.setItem(KEY, theme); } catch(e) {}
  }

  function init(){
    const saved = localStorage.getItem(KEY);
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const defaultTheme = saved || (prefersDark ? 'dark' : 'dark');
    applyTheme(defaultTheme);

    document.addEventListener('click', (e)=>{
      const t = e.target;
      if(!t) return;
      if(t.id === TOGGLE_ID){
        const cur = html.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        applyTheme(cur === 'light' ? 'dark' : 'light');
      }
    });
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();


  // Admin-only router — boots straight into the admin page
  const Router = (() => {
    function go(page) {
      if (page === 'admin') AdminPage.render();
    }
    function init() {
      AdminPage.render();
    }
    return { go, init };
  })();

  Router.init();

/* ── HELPERS ── */
function badge(s) {
  const m = {active:'bg', inactive:'br', pending:'bd', confirmed:'bb', completed:'bg', cancelled:'br'};
  return `<span class="b ${m[s]||'bd'}">${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;
}
function fmt(p) {
  return parseFloat(p).toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* ── REVENUE CHART ── */
let activeYr = 2024;
function switchYr(yr, btn) {
  activeYr = yr;
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}
function renderChart() {
  const el = document.getElementById('chartEl');
  if (!el) return;
  el.innerHTML = '';
  const data = D.revenue[activeYr] || D.revenue[2024];
  const max = Math.max(...data);
  data.forEach((v, i) => {
    const col = document.createElement('div');
    col.className = 'chcol';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:8px;font-family:Rajdhani,sans-serif;font-weight:700;color:#3a3a3a;';
    lbl.textContent = v + 'k';
    const bar = document.createElement('div');
    bar.className = 'chbar';
    bar.title = v + 'k';
    bar.style.cssText = `width:100%;height:0;transition:height .65s cubic-bezier(.25,.46,.45,.94) ${i * .04}s;`;
    col.appendChild(lbl);
    col.appendChild(bar);
    el.appendChild(col);
    setTimeout(() => { bar.style.height = (v / max * 100) + '%'; }, 60);
  });
}

/* ── LIVE FEED ── */
let livePtr = 0;
function renderLive() {
  const el = document.getElementById('liveEl');
  if (!el) return;
  el.innerHTML = '';
  const items = [...D.live.slice(livePtr), ...D.live.slice(0, livePtr)].slice(0, 5);
  items.forEach((it, i) => {
    const d = document.createElement('div');
    d.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-radius:7px;background:rgba(255,255,255,.016);border:1px solid rgba(255,255,255,.03);opacity:0;transition:opacity .28s ${i * .06}s;`;
    d.innerHTML = `<div style="display:flex;align-items:center;gap:7px;"><div style="width:6px;height:6px;border-radius:50%;background:${it.color};flex-shrink:0;"></div><span style="font-size:12px;color:#888;">${it.label}</span></div><span style="font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:${it.color};">${it.status}</span>`;
    el.appendChild(d);
    requestAnimationFrame(() => { d.style.opacity = '1'; });
  });
}
setInterval(() => { livePtr = (livePtr + 1) % D.live.length; renderLive(); }, 3500);

/* ── FEATURED GRID ── */
function renderFeatGrid() {
  const g = document.getElementById('featGrid');
  if (!g) return;
  g.innerHTML = '';
  D.featured.slice(0, 4).forEach(s => {
    const d = document.createElement('div');
    d.className = 'post-card';
    d.innerHTML = `${s.imgSrc ? `<img src="${s.imgSrc}" style="width:100%;height:75px;object-fit:cover;display:block;" alt="">` : `<div style="width:100%;height:75px;background:linear-gradient(135deg,#1e1e1e,#141414);display:flex;align-items:center;justify-content:center;"><i class="fas fa-star" style="font-size:18px;color:#2a2a2a;"></i></div>`}
    <div style="padding:9px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:#ddd;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.name}</div>
      <div class="gt" style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;">₱${fmt(s.price)}</div>
    </div>`;
    g.appendChild(d);
  });
}

/* ── SHOP DASH GRID ── */
function renderShopDash() {
  const g = document.getElementById('shopGridDash');
  if (!g) return;
  g.innerHTML = '';
  D.shop.slice(0, 4).forEach(s => {
    const d = document.createElement('div');
    d.className = 'post-card';
    d.innerHTML = `<div style="width:100%;height:80px;background:linear-gradient(135deg,#1e1e1e,#141414);display:flex;align-items:center;justify-content:center;"><i class="fas fa-box" style="font-size:18px;color:#2a2a2a;"></i></div>
    <div style="padding:9px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:#ddd;margin-bottom:1px;">${s.name}</div>
      <div class="gt" style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;">₱${fmt(s.price)}</div>
      <div style="font-size:9px;color:#3a3a3a;margin-top:2px;">${s.stock} in stock</div>
    </div>`;
    g.appendChild(d);
  });
}

/* ── RECENT BOOKINGS ── */
function renderRecent() {
  const el = document.getElementById('recentEl');
  if (!el) return;
  el.innerHTML = '';
  const icons = {confirmed:'fa-check', pending:'fa-clock', completed:'fa-check-double', cancelled:'fa-times'};
  const rgb = {confirmed:'59,130,246', pending:'166,127,56', completed:'16,185,129', cancelled:'239,68,68'};
  D.bookings.slice(0, 5).forEach(b => {
    const c = rgb[b.status] || '166,127,56';
    const d = document.createElement('div');
    d.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.03);transition:background .15s;';
    d.onmouseover = () => d.style.background = 'rgba(166,127,56,.04)';
    d.onmouseout = () => d.style.background = 'transparent';
    d.innerHTML = `<div style="width:26px;height:26px;border-radius:6px;background:rgba(${c},.1);border:1px solid rgba(${c},.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas ${icons[b.status]||'fa-circle'}" style="font-size:9px;color:rgb(${c});"></i></div><div style="flex:1;min-width:0;"><div style="font-size:11px;font-weight:600;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.customer}</div><div style="font-size:9px;color:#2a2a2a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.service}</div></div>${badge(b.status)}`;
    d.onclick = () => showBk(b);
    el.appendChild(d);
  });
}

/* ── NOTIFICATIONS ── */
function renderNotifs() {
  const list = document.getElementById('nfList');
  const b = document.getElementById('nBadge');
  if (!list) return;
  const unr = D.notifs.filter(n => !n.read).length;
  b.textContent = unr;
  b.style.display = unr ? 'flex' : 'none';
  list.innerHTML = '';
  D.notifs.forEach(n => {
    const d = document.createElement('div');
    d.className = 'nfi ' + (n.read ? 'rd' : 'unr');
    d.innerHTML = `<div style="width:37px;height:37px;border-radius:50%;background:${n.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas ${n.icon}" style="color:${n.color};font-size:14px;"></i></div><div style="flex:1;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;"><span style="font-family:Rajdhani,sans-serif;font-weight:800;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:${n.read?'#333':'#A67F38'};">${n.tag}</span>${!n.read?'<span style="width:5px;height:5px;border-radius:50%;background:#F2DB94;display:inline-block;flex-shrink:0;"></span>':''}</div><p style="font-size:12px;color:${n.read?'#333':'#ccc'};line-height:1.5;margin-bottom:3px;">${n.text}</p><span style="font-size:9.5px;color:#222;">${n.time}</span></div>`;
    d.onclick = () => { n.read = true; renderNotifs(); };
    list.appendChild(d);
  });
}

/* ── BOOKING MODAL ── */
function showBk(b) {
  document.getElementById('bkTitle').textContent = b.id;
  document.getElementById('bkBody').innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${[['Customer',b.customer],['Service',b.service],['Date',b.date],['Time',b.time],['Status',b.status]].map(([k,v]) => `<div style="padding:10px;border-radius:9px;background:rgba(166,127,56,.04);border:1px solid rgba(166,127,56,.08);"><div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#282828;margin-bottom:4px;">${k}</div><div style="font-size:13px;color:#ccc;">${k==='Status'?badge(v):v}</div></div>`).join('')}</div>`;
  openModal('bkModal');
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ── NOTIFICATION PANEL ── */
function openNotif() {
  document.getElementById('nfPan').classList.add('open');
  document.getElementById('nfOv').classList.add('show');
  document.getElementById('bellBtn').classList.add('hidden');
}
function closeNotif() {
  document.getElementById('nfPan').classList.remove('open');
  document.getElementById('nfOv').classList.remove('show');
  document.getElementById('bellBtn').classList.remove('hidden');
}
function markAllRead() { D.notifs.forEach(n => n.read = true); renderNotifs(); }
function clearNotifs() { D.notifs.length = 0; renderNotifs(); }

/* ── PROFILE DROPDOWN ── */
let ddOpen = false;
function toggleDD() {
  ddOpen = !ddOpen;
  document.getElementById('profDD').classList.toggle('open', ddOpen);
  document.getElementById('pChev').style.transform = ddOpen ? 'rotate(180deg)' : '';
}
function closeDD() {
  ddOpen = false;
  document.getElementById('profDD').classList.remove('open');
  document.getElementById('pChev').style.transform = '';
}
document.addEventListener('click', e => {
  if (!document.getElementById('profWrap').contains(e.target)) closeDD();
});

/* ── SIDEBAR TOGGLE ── */
function toggleSb() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sbOv').classList.toggle('show'); }
function closeSb() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOv').classList.remove('show'); }

/* ── CLOCK ── */
function tick() {
  const now = new Date();
  const ct = document.getElementById('clkTime'), cd = document.getElementById('clkDate');
  if (ct) ct.textContent = now.toLocaleTimeString('en-US', {hour12: false});
  if (cd) cd.textContent = now.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
setInterval(tick, 1000);
tick();

/* ── RESPONSIVE ── */
const mBtn = document.getElementById('menuBtn');
function onResize() {
  const mob = window.innerWidth < 1024;
  mBtn.style.display = mob ? 'flex' : 'none';
  document.getElementById('sbClose').style.display = mob ? 'block' : 'none';
  if (!mob) closeSb();
  document.getElementById('clkWrap').style.display = window.innerWidth >= 768 ? 'block' : 'none';
}
window.addEventListener('resize', onResize);
onResize();

/* ── INIT ── */
renderFeatGrid();
renderShopDash();
renderRecent();
renderChart();
renderLive();
renderNotifs();
  </script>
