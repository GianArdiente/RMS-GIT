<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080808">
  <title>Autoshop — Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="Login (1).css"/>
</head>
<body>

<!-- Scene background -->
<div class="scene">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="page-scan"></div>
  <div class="noise"></div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- Auth Wrapper -->
<div class="wrap">
  <div class="card show-signup" id="card">

    <div class="card-scan"></div>
    <div class="card-road"></div>

    <!-- Tire rings flanking the card -->
    <div class="tire-ring tire-ring-l"></div>
    <div class="tire-ring tire-ring-r"></div>

    <!-- SVG corner ornaments -->
    <!-- TL: Wrench -->
    <div class="bracket br-tl">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M2 2 L12 2 M2 2 L2 12" stroke="#8B6914" stroke-width="1.5" opacity=".7"/>
        <circle cx="2" cy="2" r="1.5" fill="#8B6914" opacity=".6"/>
        <g transform="translate(10,10) rotate(45)" opacity=".45">
          <rect x="1" y="3.5" width="13" height="3" rx="1.5" fill="#8B6914"/>
          <circle cx="2.5" cy="5" r="3" fill="none" stroke="#8B6914" stroke-width="1.5"/>
          <circle cx="12.5" cy="5" r="2.5" fill="none" stroke="#8B6914" stroke-width="1.5"/>
        </g>
      </svg>
    </div>
    <!-- TR: Gear -->
    <div class="bracket br-tr">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M30 2 L20 2 M30 2 L30 12" stroke="#8B6914" stroke-width="1.5" opacity=".7"/>
        <circle cx="30" cy="2" r="1.5" fill="#8B6914" opacity=".6"/>
        <g transform="translate(12,12)" opacity=".45">
          <circle cx="0" cy="0" r="5" fill="none" stroke="#8B6914" stroke-width="1.5"/>
          <circle cx="0" cy="0" r="2" fill="#8B6914" opacity=".6"/>
          <rect x="-1" y="-7.5" width="2" height="3" rx=".5" fill="#8B6914"/>
          <rect x="-1" y="4.5"  width="2" height="3" rx=".5" fill="#8B6914"/>
          <rect x="-7.5" y="-1" width="3" height="2" rx=".5" fill="#8B6914"/>
          <rect x="4.5"  y="-1" width="3" height="2" rx=".5" fill="#8B6914"/>
        </g>
      </svg>
    </div>
    <!-- BL: Tire -->
    <div class="bracket br-bl">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M2 30 L12 30 M2 30 L2 20" stroke="#8B6914" stroke-width="1.5" opacity=".7"/>
        <circle cx="2" cy="30" r="1.5" fill="#8B6914" opacity=".6"/>
        <g transform="translate(18,16)" opacity=".45">
          <circle cx="0" cy="0" r="7.5" fill="none" stroke="#8B6914" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="3.5" fill="none" stroke="#8B6914" stroke-width="1"/>
          <circle cx="0" cy="0" r="1.5" fill="#8B6914"/>
          <line x1="0" y1="-7.5" x2="0" y2="-4" stroke="#8B6914" stroke-width="1.5"/>
          <line x1="0" y1="4"    x2="0" y2="7.5" stroke="#8B6914" stroke-width="1.5"/>
          <line x1="-7.5" y1="0" x2="-4" y2="0" stroke="#8B6914" stroke-width="1.5"/>
          <line x1="4"    y1="0" x2="7.5" y2="0" stroke="#8B6914" stroke-width="1.5"/>
        </g>
      </svg>
    </div>
    <!-- BR: Spark plug -->
    <div class="bracket br-br">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M30 30 L20 30 M30 30 L30 20" stroke="#8B6914" stroke-width="1.5" opacity=".7"/>
        <circle cx="30" cy="30" r="1.5" fill="#8B6914" opacity=".6"/>
        <g transform="translate(14,14)" opacity=".45">
          <rect x="-4" y="-10" width="8" height="4" rx="1" fill="none" stroke="#8B6914" stroke-width="1.2"/>
          <line x1="-4" y1="-4" x2="4" y2="-4" stroke="#8B6914" stroke-width="1"/>
          <polygon points="2,-4 -2,2 1.5,2 -2,9" fill="#8B6914"/>
        </g>
      </svg>
    </div>

    <!-- Circuit traces -->
    <div class="trace trace-h" style="top:18px;left:40px;width:60px;"></div>
    <div class="trace trace-h" style="bottom:18px;right:40px;width:80px;"></div>
    <div class="trace trace-v" style="top:30px;right:18px;height:50px;"></div>
    <div class="trace trace-v" style="bottom:30px;left:18px;height:50px;"></div>

    <!-- ════════════════
         LEFT — SIGN UP
    ════════════════ -->
    <div class="panel panel-left" id="signupPanel">
      <div class="logo-badge">
        <img src="Ecologo.png" alt="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="fallback-r" style="display:none">A</span>
      </div>

      <div class="panel-head">
        <div class="panel-eyebrow">// New Account</div>
        <div class="panel-title">CREATE <span class="gold">ACCOUNT</span></div>
      </div>

      <!-- Repair icon row -->
      <div class="repair-row">
        <i class="fas fa-tools"></i>
        <div class="rr-sep"></div>
        <i class="fas fa-car-side"></i>
        <div class="rr-sep"></div>
        <i class="fas fa-oil-can"></i>
        <div class="rr-sep"></div>
        <i class="fas fa-tachometer-alt"></i>
      </div>

      <div class="social-row">
        <button class="social-btn" data-social="Google" title="Google"><i class="fab fa-google"></i></button>
        <button class="social-btn" data-social="Phone"  title="Phone"><i class="fas fa-phone"></i></button>
      </div>

      <div class="divider"><span><i class="fas fa-cog" style="font-size:8px;margin-right:4px"></i>register with email</span></div>

      <form class="form" id="signupForm" novalidate>
        <div class="field">
          <i class="fas fa-user field-icon"></i>
          <input type="text"     id="fullName"        placeholder="Full Name"        autocomplete="name"         required>
        </div>
        <div class="field">
          <i class="fas fa-envelope field-icon"></i>
          <input type="email"    id="email"            placeholder="Email Address"    autocomplete="email"        required>
        </div>
        <div class="field">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="password"         placeholder="Password"         autocomplete="new-password" required>
          <i class="fas fa-eye eye-btn" id="togglePassword"></i>
        </div>
        <div class="field">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="confirmPassword"  placeholder="Confirm Password" autocomplete="new-password" required>
          <i class="fas fa-eye eye-btn" id="toggleConfirmPassword"></i>
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-wrench" style="margin-right:7px;font-size:11px"></i>Create Account
        </button>
      </form>

      <div class="switch-text">
        Have an account? <span class="link" id="goToLogin">Log in</span>
      </div>
    </div>

    <!-- ════════════════
         RIGHT — LOGIN
    ════════════════ -->
    <div class="panel panel-right" id="loginPanel">
      <div class="logo-badge">
        <img src="Ecologo.png" alt="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="fallback-r" style="display:none">A</span>
      </div>

      <div class="panel-head">
        <div class="panel-eyebrow">// Authenticate</div>
        <div class="panel-title"><span class="gold">LOG IN</span> TO AUTOSHOP</div>
      </div>

      <!-- Repair icon row -->
      <div class="repair-row">
        <i class="fas fa-wrench"></i>
        <div class="rr-sep"></div>
        <i class="fas fa-car"></i>
        <div class="rr-sep"></div>
        <i class="fas fa-gas-pump"></i>
        <div class="rr-sep"></div>
        <i class="fas fa-cog"></i>
      </div>

      <div class="social-row">
        <button class="social-btn" data-social="Google" title="Google"><i class="fab fa-google"></i></button>
        <button class="social-btn" data-social="Phone"  title="Phone"><i class="fas fa-phone"></i></button>
      </div>

      <div class="divider"><span><i class="fas fa-wrench" style="font-size:8px;margin-right:4px"></i>log in with email</span></div>

      <form class="form" id="loginForm" novalidate>
        <div class="field">
          <i class="fas fa-envelope field-icon"></i>
          <input type="email"    id="loginEmail"    placeholder="Email Address" autocomplete="email"            required>
        </div>
        <div class="field">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="loginPassword" placeholder="Password"      autocomplete="current-password" required>
          <i class="fas fa-eye eye-btn" id="toggleLoginPassword"></i>
        </div>
        <div class="forgot" id="forgotPassword">Forgot your password?</div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-car-side" style="margin-right:7px;font-size:11px" href="../../NewHome/Home.html"></i>Log In
        </button>
      </form>

      <div class="switch-text">
        No account? <span class="link" id="goToSignup">Sign up</span>
      </div>
    </div>

    <!-- ════════════════
         GOLD SLIDE PANEL
    ════════════════ -->
    <div class="gold-panel pos-right" id="goldPanel">
      <div class="gp-edge"></div>
      <div class="gp-scan"></div>

      <!-- Cogs -->
      <i class="fas fa-cog gp-cog gp-cog-1"></i>
      <i class="fas fa-cog gp-cog gp-cog-2"></i>
      <i class="fas fa-cog gp-cog gp-cog-3"></i>

      <!-- Corner brackets -->
      <div class="gp-br gp-tl"></div>
      <div class="gp-br gp-tr"></div>
      <div class="gp-br gp-bl"></div>
      <div class="gp-br gp-bri"></div>

      <!-- Spark particles -->
      <div class="gp-spark gp-spark-1"></div>
      <div class="gp-spark gp-spark-2"></div>
      <div class="gp-spark gp-spark-3"></div>
      <div class="gp-spark gp-spark-4"></div>

      <!-- Speedometer arc -->
      <div class="gp-speedo">
        <svg viewBox="0 0 48 26" fill="none">
          <path d="M4 24 A20 20 0 0 1 44 24" stroke="rgba(0,0,0,0.3)" stroke-width="2" stroke-dasharray="3 4"/>
          <path d="M8 24 A16 16 0 0 1 40 24" stroke="rgba(0,0,0,0.18)" stroke-width="1" stroke-dasharray="2 5"/>
          <line x1="4"  y1="24" x2="7"  y2="21" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
          <line x1="24" y1="4"  x2="24" y2="8"  stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
          <line x1="44" y1="24" x2="41" y2="21" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
        </svg>
      </div>

      <!-- Logo -->
      <div class="gp-logo">
        <img src="Ecologo.png" alt="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="fallback-r" style="display:none">A</span>
      </div>

      <div class="gp-headline" id="gpHeadline">WELCOME<br>BACK</div>
      <div class="gp-sub" id="gpSub">Enter your credentials to access your Autoshop dashboard and manage your shop.</div>

      <!-- Pistons -->
      <div class="gp-pistons">
        <div class="gp-piston-unit">
          <div class="gp-piston-head"></div>
          <div class="gp-piston-rod"></div>
          <div class="gp-piston-base"></div>
        </div>
        <div class="gp-piston-unit">
          <div class="gp-piston-head"></div>
          <div class="gp-piston-rod"></div>
          <div class="gp-piston-base"></div>
        </div>
        <div class="gp-piston-unit">
          <div class="gp-piston-head"></div>
          <div class="gp-piston-rod"></div>
          <div class="gp-piston-base"></div>
        </div>
        <div class="gp-piston-unit">
          <div class="gp-piston-head"></div>
          <div class="gp-piston-rod"></div>
          <div class="gp-piston-base"></div>
        </div>
      </div>

      <button class="gp-btn" id="gpBtn">Log In</button><button class="gp-btn" id="gpBtn" onclick="window.location.href='../../NewHome/Home.html'">Log In</button>


      <!-- Car silhouette SVG -->
      <div class="gp-car-svg">
        <svg width="160" height="52" viewBox="0 0 160 52" fill="none">
          <!-- Body -->
          <rect x="18" y="26" width="124" height="20" rx="3" fill="rgba(0,0,0,0.4)"/>
          <!-- Cabin -->
          <path d="M42 26 L52 10 L108 10 L120 26" fill="rgba(0,0,0,0.35)"/>
          <!-- Windows -->
          <path d="M56 24 L62 13 L82 13 L82 24" fill="rgba(0,0,0,0.2)"/>
          <path d="M85 24 L85 13 L105 13 L112 24" fill="rgba(0,0,0,0.2)"/>
          <!-- Wheels -->
          <circle cx="46"  cy="46" r="11" fill="rgba(0,0,0,0.45)" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
          <circle cx="114" cy="46" r="11" fill="rgba(0,0,0,0.45)" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
          <circle cx="46"  cy="46" r="5"  fill="rgba(0,0,0,0.3)"/>
          <circle cx="114" cy="46" r="5"  fill="rgba(0,0,0,0.3)"/>
          <!-- Wheel spokes -->
          <line x1="46" y1="35" x2="46" y2="41" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="46" y1="51" x2="46" y2="57" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="35" y1="46" x2="41" y2="46" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="51" y1="46" x2="57" y2="46" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="114" y1="35" x2="114" y2="41" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="114" y1="51" x2="114" y2="57" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="103" y1="46" x2="109" y2="46" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <line x1="119" y1="46" x2="125" y2="46" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <!-- Headlights -->
          <rect x="136" y="30" width="8" height="5" rx="1" fill="rgba(0,0,0,0.35)"/>
          <!-- Grille lines -->
          <line x1="138" y1="38" x2="142" y2="38" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
          <line x1="138" y1="41" x2="142" y2="41" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
          <!-- Ground shadow -->
          <ellipse cx="80" cy="52" rx="70" ry="3" fill="rgba(0,0,0,0.15)"/>
        </svg>
      </div>

      <!-- Exhaust puffs -->
      <div class="gp-exhaust gp-exhaust-1"><div class="exhaust-puff exhaust-puff-1"></div></div>
      <div class="gp-exhaust gp-exhaust-2"><div class="exhaust-puff exhaust-puff-2"></div></div>
      <div class="gp-exhaust gp-exhaust-3"><div class="exhaust-puff exhaust-puff-3"></div></div>

      <div class="gp-status">
        <div class="gp-dot"></div>
        <span>System Online</span>
      </div>
    </div>

  </div>
</div>

<script src="Login.js"></script>
</body>
</html>
